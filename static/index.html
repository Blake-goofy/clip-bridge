<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ClipBridge</title>
  <style nonce="{{NONCE}}">
    :root {
      color-scheme: light dark;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f7f7f4;
      color: #171717;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    main {
      width: min(100%, 520px);
      display: grid;
      gap: 18px;
    }
    .panel {
      border: 1px solid #d9dbd2;
      border-radius: 8px;
      background: #ffffff;
      padding: 18px;
      display: grid;
      gap: 14px;
      box-shadow: 0 1px 8px rgba(20, 20, 15, .06);
    }
    .qr {
      width: min(100%, 288px);
      aspect-ratio: 1;
      justify-self: center;
      border: 1px solid #d9dbd2;
      border-radius: 8px;
      padding: 12px;
      background: #fff;
    }
    .qr img { display: block; width: 100%; height: 100%; }
    .status {
      min-height: 24px;
      font-weight: 650;
    }
    .muted { color: #666a61; font-size: 14px; }
    .messages {
      min-height: 180px;
      max-height: 46vh;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 2px;
    }
    .bubble {
      width: fit-content;
      max-width: 86%;
      height: auto;
      min-height: 0;
      display: grid;
      gap: 5px;
      border: 1px solid #d9dbd2;
      border-radius: 8px;
      padding: 10px 12px;
      color: #171717;
      background: #f4f5f0;
      font-weight: 500;
      text-align: left;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }
    .bubble.sent {
      align-self: flex-end;
      border-color: #174ea6;
      background: #174ea6;
      color: #fff;
    }
    .bubble.received { align-self: flex-start; }
    .stamp {
      font-size: 12px;
      color: #767a70;
      font-weight: 500;
    }
    .bubble.sent .stamp { color: rgba(255, 255, 255, .72); }
    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    button {
      min-height: 44px;
      border: 0;
      border-radius: 8px;
      padding: 0 14px;
      background: #174ea6;
      color: #fff;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }
    button.secondary {
      background: #e8ebe3;
      color: #171717;
    }
    button:disabled {
      cursor: not-allowed;
      opacity: .55;
    }
    .hidden { display: none !important; }
    #toast {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%);
      max-width: calc(100vw - 32px);
      padding: 10px 12px;
      border-radius: 8px;
      background: #171717;
      color: #fff;
      font-size: 14px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .15s ease;
    }
    #toast.show { opacity: 1; }
    @media (prefers-color-scheme: dark) {
      :root { background: #11130f; color: #f4f4ef; }
      .panel { background: #1b1d18; border-color: #34372f; box-shadow: none; }
      .muted { color: #b9beb1; }
      button.secondary { background: #34372f; color: #f4f4ef; }
      .bubble { background: #252820; color: #f4f4ef; border-color: #3c4037; }
      .bubble.sent { background: #8ab4f8; border-color: #8ab4f8; color: #11130f; }
      .stamp { color: #a7ada0; }
      .bubble.sent .stamp { color: rgba(17, 19, 15, .68); }
    }
  </style>
</head>
<body>
  <main>
    <section id="pc" class="panel hidden" aria-label="Clipboard">
      <div id="qrWrap" class="qr"><img id="qr" alt="QR code for pairing"></div>
      <div id="pcStatus" class="status">Creating session...</div>
      <div id="device" class="muted">No device connected.</div>
      <div id="pcMessages" class="messages hidden" aria-label="Messages"></div>
      <div id="pcActions" class="actions hidden">
        <button id="sendPC" type="button">Send</button>
        <button id="newSession" class="secondary" type="button">New Session</button>
      </div>
    </section>

    <section id="mobile" class="panel hidden" aria-label="Clipboard">
      <div id="mobileStatus" class="status">Connecting...</div>
      <div class="actions">
        <button id="sendClipboard" type="button">Send</button>
      </div>
      <div id="mobileMessages" class="messages hidden" aria-label="Messages"></div>
    </section>
  </main>
  <div id="toast" role="status" aria-live="polite"></div>

  <script nonce="{{NONCE}}">
    const pc = document.querySelector("#pc");
    const mobile = document.querySelector("#mobile");
    const toast = document.querySelector("#toast");
    const sessionMatch = location.pathname.match(/^\/s\/([^/]+)$/);
    let sid = sessionMatch ? sessionMatch[1] : "";
    let joined = false;

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toast.classList.remove("show"), 1800);
    }

    async function postJSON(url, body) {
      const res = await fetch(url, {
        method: "POST",
        credentials: "same-origin",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body || {})
      });
      if (!res.ok) {
        let message = "Request failed";
        try {
          const data = await res.json();
          message = data.error || message;
        } catch (_) {}
        throw new Error(message);
      }
      return res.json();
    }

    function timeLabel(date) {
      return new Intl.DateTimeFormat([], { hour: "numeric", minute: "2-digit" }).format(date);
    }

    function addMessage(list, direction, text) {
      list.classList.remove("hidden");
      const bubble = document.createElement("button");
      bubble.type = "button";
      bubble.className = `bubble ${direction}`;
      bubble.title = "Copy";

      const body = document.createElement("span");
      body.textContent = text || "";
      const stamp = document.createElement("span");
      stamp.className = "stamp";
      stamp.textContent = timeLabel(new Date());

      bubble.append(body, stamp);
      bubble.onclick = async () => {
        try {
          await navigator.clipboard.writeText(text || "");
          showToast("Copied");
        } catch (_) {
          showToast("Copy blocked");
        }
      };
      list.append(bubble);
      list.scrollTop = list.scrollHeight;
    }

    function websocketURL(role) {
      const scheme = location.protocol === "https:" ? "wss:" : "ws:";
      return `${scheme}//${location.host}/ws/${sid}/${role}`;
    }

    async function receiveText(status, messages, text) {
      addMessage(messages, "received", text);
      try {
        if (!document.hasFocus()) throw new Error("tab is not active");
        await navigator.clipboard.writeText(text);
        status.textContent = "Received and copied.";
      } catch (_) {
        status.textContent = "Received.";
      }
      showToast("Received");
    }

    async function sendClipboard(status, messages) {
      let text = "";
      try {
        text = await navigator.clipboard.readText();
      } catch (_) {
        status.textContent = "Clipboard access blocked.";
        return;
      }
      try {
        await postJSON(`/api/session/${sid}/clipboard`, { text });
        status.textContent = "Sent.";
        addMessage(messages, "sent", text);
        showToast("Sent");
      } catch (err) {
        status.textContent = err.message;
      }
    }

    async function startPC() {
      pc.classList.remove("hidden");
      const status = document.querySelector("#pcStatus");
      const device = document.querySelector("#device");
      const qr = document.querySelector("#qr");
      const qrWrap = document.querySelector("#qrWrap");
      const actions = document.querySelector("#pcActions");
      const messages = document.querySelector("#pcMessages");

      const data = await postJSON("/api/session");
      sid = data.sid;
      qr.src = data.qrURL;
      status.textContent = "Scan QR code to connect.";

      const ws = new WebSocket(websocketURL("pc"));
      ws.onopen = () => status.textContent = "Scan QR code to connect.";
      ws.onclose = () => status.textContent = "Session closed. Create a new session to reconnect.";
      ws.onerror = () => status.textContent = "Connection failed. Create a new session to retry.";
      ws.onmessage = async (message) => {
        const event = JSON.parse(message.data);
        if (event.type === "presence") {
          device.textContent = event.connected ? "Device connected." : "No device connected.";
          status.textContent = event.connected ? "Ready." : "Scan QR code to connect.";
          qrWrap.classList.toggle("hidden", event.connected);
          actions.classList.toggle("hidden", !event.connected);
          return;
        }
        if (event.type !== "clipboard.text") return;
        receiveText(status, messages, event.text || "");
      };

      document.querySelector("#sendPC").onclick = () => sendClipboard(status, messages);
      document.querySelector("#newSession").onclick = () => location.href = "/";
    }

    function deviceLabel() {
      return "Device";
    }

    async function joinMobile() {
      if (joined) return;
      await postJSON(`/api/session/${sid}/join`, { device: deviceLabel() });
      joined = true;
      document.querySelector("#mobileStatus").textContent = "Connected.";
    }

    async function startMobile() {
      mobile.classList.remove("hidden");
      const status = document.querySelector("#mobileStatus");
      const messages = document.querySelector("#mobileMessages");
      joinMobile()
        .then(() => {
          const ws = new WebSocket(websocketURL("mobile"));
          ws.onopen = () => status.textContent = "Connected.";
          ws.onclose = () => status.textContent = "Session closed.";
          ws.onerror = () => status.textContent = "Connection failed.";
          ws.onmessage = (message) => {
            const event = JSON.parse(message.data);
            if (event.type === "clipboard.text") receiveText(status, messages, event.text || "");
          };
        })
        .catch((err) => status.textContent = err.message);

      document.querySelector("#sendClipboard").onclick = () => sendClipboard(status, messages);
    }

    if (sid) {
      startMobile();
    } else {
      startPC().catch((err) => {
        pc.classList.remove("hidden");
        document.querySelector("#pcStatus").textContent = err.message;
      });
    }
  </script>
</body>
</html>
