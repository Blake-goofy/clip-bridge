<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ClipBridge</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <style nonce="{{NONCE}}">
    :root {
      color-scheme: light dark;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f8f8f3;
      color: #171717;
      overflow-x: hidden;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100svh;
      padding: 22px;
      position: relative;
      overflow-x: hidden;
    }
    .app-layout {
      width: min(100%, 980px);
      min-height: calc(100vh - 44px);
      min-height: calc(100svh - 44px);
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(0, 520px);
      justify-content: center;
      gap: 18px;
    }
    main {
      width: 100%;
      min-height: calc(100vh - 44px);
      min-height: calc(100svh - 44px);
      display: grid;
      grid-template-rows: auto auto minmax(12px, 1fr) auto auto auto auto;
      gap: 16px;
    }
    .app-header {
      display: grid;
      gap: 12px;
      text-align: center;
    }
    h1 {
      margin: 0;
      font-size: clamp(28px, 8vw, 42px);
      line-height: 1;
      letter-spacing: 0;
    }
    .tagline {
      min-height: 22px;
      margin: 0;
      color: #5c6257;
      font-size: 15px;
      font-weight: 650;
    }
    .screen {
      display: grid;
      gap: 14px;
      align-content: start;
    }
    .qr {
      width: min(100%, 288px);
      aspect-ratio: 1;
      justify-self: center;
      border: 1px solid #d9dbd2;
      border-radius: 8px;
      padding: 12px;
      background: #fff;
    }
    .qr img { display: block; width: 100%; height: 100%; }
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
    .messages {
      display: none !important;
    }
    .bubble {
      display: none !important;
    }
    .spacer { min-height: 12px; }
    .button-spacer { min-height: 0; }
    .notice {
      width: min(100%, 340px);
      justify-self: center;
      min-height: 102px;
      border: 1px solid transparent;
      border-radius: 8px;
      padding: 14px;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 10px 12px;
      align-items: start;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity .16s ease, transform .16s ease;
    }
    .notice.show {
      opacity: 1;
      transform: translateY(0);
    }
    .notice.success {
      border-color: #bbf7d0;
      background: #f0fdf4;
    }
    .notice.pending {
      border-color: #fde68a;
      background: #fffbeb;
    }
    .notice.error {
      border-color: #fecaca;
      background: #fff1f2;
    }
    .notif-icon {
      width: 30px;
      height: 30px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      font-size: 18px;
      font-weight: 800;
    }
    .notice.success .notif-icon {
      background: #dcfce7;
      color: #22c55e;
    }
    .notice.pending .notif-icon {
      background: #fef3c7;
      color: #b45309;
    }
    .notice.error .notif-icon {
      background: #ffe4e6;
      color: #be123c;
    }
    .notif-status {
      align-self: center;
      font-size: 15px;
      font-weight: 750;
      color: #171717;
    }
    .notif-data {
      grid-column: 1 / -1;
      max-height: 110px;
      overflow-y: auto;
      color: #3f463b;
      font-size: 13px;
      line-height: 1.35;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .actions {
      display: flex;
      justify-content: center;
    }
    button {
      min-height: 50px;
      border: 0;
      border-radius: 8px;
      padding: 0 20px;
      background: #174ea6;
      color: #fff;
      font: inherit;
      font-weight: 750;
      cursor: pointer;
    }
    button:disabled {
      cursor: not-allowed;
      opacity: .55;
    }
    .send-button {
      width: min(100%, 340px);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .send-button svg {
      width: 20px;
      height: 20px;
      stroke-width: 2.5;
    }
    .desktop-pane {
      width: 100%;
      border: 1px solid #d9dbd2;
      border-radius: 8px;
      background: #fff;
      padding: 16px;
      align-self: start;
    }
    .device-pane-toggle {
      display: none;
    }
    .pane-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: baseline;
      margin-top: 14px;
      margin-bottom: 12px;
    }
    .pane-head h2 {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
      letter-spacing: 0;
    }
    .device-count {
      color: #5c6257;
      font-size: 13px;
      font-weight: 650;
      white-space: nowrap;
    }
    .join-link-row {
      display: grid;
      grid-template-columns: 42px minmax(0, 1fr);
      gap: 8px;
      align-items: center;
    }
    .refresh-link {
      width: 42px;
      min-height: 44px;
      padding: 0;
      display: grid;
      place-items: center;
      border: 1px solid #d9dbd2;
      background: #f8f8f3;
      color: #174ea6;
    }
    .refresh-link svg {
      width: 19px;
      height: 19px;
      stroke-width: 2.2;
    }
    .copy-link {
      width: 100%;
      min-height: 44px;
      justify-content: space-between;
      gap: 10px;
      border: 1px solid #d9dbd2;
      background: #f8f8f3;
      color: #171717;
      display: flex;
      align-items: center;
      text-align: left;
    }
    .copy-link span {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 13px;
      font-weight: 650;
    }
    .copy-link svg {
      width: 18px;
      height: 18px;
      flex: 0 0 auto;
    }
    .device-list {
      display: grid;
      margin-top: 14px;
      border-top: 1px solid #e3e5dd;
    }
    .device-row {
      display: grid;
      grid-template-columns: 10px minmax(0, 1fr) 34px;
      gap: 8px 10px;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid #e3e5dd;
      cursor: pointer;
    }
    .device-status {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #dc2626;
    }
    .device-status.online {
      background: #16a34a;
    }
    .device-name {
      min-width: 0;
      color: #171717;
      font-weight: 650;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .device-meta {
      grid-column: 2 / -1;
      color: #5c6257;
      font-size: 12px;
      line-height: 1.35;
    }
    .edit-device-button {
      width: 34px;
      min-height: 34px;
      padding: 0;
      display: grid;
      place-items: center;
      border: 1px solid transparent;
      background: transparent;
      color: #5c6257;
      opacity: 0;
      transition: opacity .12s ease, background-color .12s ease, border-color .12s ease;
    }
    .device-row:hover .edit-device-button,
    .edit-device-button:focus-visible {
      opacity: 1;
    }
    .edit-device-button:hover,
    .edit-device-button:focus-visible {
      border-color: #d9dbd2;
      background: #f8f8f3;
      color: #174ea6;
    }
    .edit-device-button svg {
      width: 17px;
      height: 17px;
      stroke-width: 2.4;
    }
    .empty-devices {
      margin: 12px 0 0;
      color: #5c6257;
      font-size: 13px;
    }
    .modal {
      position: absolute;
      inset: 0;
      z-index: 10;
      display: grid;
      place-items: center;
      padding: 22px;
      min-height: 100%;
      background: rgba(23, 23, 23, .34);
    }
    .modal-card {
      width: min(100%, 360px);
      border: 1px solid #d9dbd2;
      border-radius: 8px;
      background: #fff;
      padding: 16px;
    }
    .modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }
    .modal-head h2 {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
    }
    .icon-button {
      width: 34px;
      min-height: 34px;
      padding: 0;
      display: grid;
      place-items: center;
      border: 1px solid transparent;
      background: transparent;
      color: #5c6257;
    }
    .icon-button:hover,
    .icon-button:focus-visible {
      border-color: #d9dbd2;
      background: #f8f8f3;
      color: #171717;
    }
    .icon-button svg {
      width: 18px;
      height: 18px;
      stroke-width: 2.4;
    }
    .modal-field {
      display: grid;
      gap: 6px;
      color: #5c6257;
      font-size: 13px;
      font-weight: 650;
    }
    .modal-field input {
      min-height: 42px;
      border: 1px solid #d9dbd2;
      border-radius: 6px;
      padding: 0 10px;
      background: #fff;
      color: #171717;
      font: inherit;
      font-weight: 650;
    }
    .modal-actions {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-top: 16px;
    }
    .danger-button {
      background: #fff1f2;
      color: #be123c;
      border: 1px solid #fecaca;
    }
    .hidden { display: none !important; }
    footer {
      padding-top: 2px;
      text-align: center;
      font-size: 13px;
      color: #5c6257;
    }
    footer a {
      color: #5c6257;
      text-decoration-thickness: 1px;
      text-underline-offset: 3px;
    }
    footer a:hover { color: #174ea6; }

    @media (min-width: 900px) {
      body.pc-mode {
        padding-right: 0;
      }
      .app-layout.pc-mode {
        width: 100%;
        max-width: none;
        margin: 0;
        padding-right: 342px;
        position: relative;
        grid-template-columns: minmax(0, 1fr) minmax(0, 520px) minmax(0, 1fr);
        justify-content: stretch;
      }
      .app-layout.pc-mode main {
        grid-column: 2;
      }
      .app-layout.pc-mode .desktop-pane {
        position: absolute;
        top: -22px;
        right: 0;
        width: 320px;
        height: 100svh;
        overflow-y: auto;
        border-top: 0;
        border-right: 0;
        border-bottom: 0;
        border-radius: 8px 0 0 8px;
      }
    }
    @media (max-width: 899px) {
      body.mobile-mode,
      body.pc-mode {
        overflow-x: hidden;
      }
      body.mobile-mode main,
      body.pc-mode main {
        grid-template-rows: auto auto minmax(8px, 1fr) auto auto auto auto;
        gap: 12px;
      }
      body.mobile-mode .qr,
      body.pc-mode .qr {
        width: min(100%, 224px);
        padding: 10px;
      }
      body.mobile-mode .notice,
      body.pc-mode .notice {
        min-height: 86px;
      }
      .device-pane-toggle {
        position: absolute;
        top: 10px;
        right: 0;
        z-index: 6;
        width: 34px;
        min-height: 40px;
        padding: 0;
        display: grid;
        place-items: center;
        border: 1px solid #d9dbd2;
        border-right: 0;
        border-radius: 8px 0 0 8px;
        background: #fff;
        color: #174ea6;
      }
      .device-pane-toggle svg {
        width: 18px;
        height: 18px;
        stroke-width: 2.5;
      }
      body.mobile-mode .desktop-pane,
      body.pc-mode .desktop-pane {
        display: none;
        position: absolute;
        top: 0;
        right: 0;
        z-index: 5;
        width: min(86vw, 320px);
        min-height: 100svh;
        overflow-y: auto;
        border-top: 0;
        border-right: 0;
        border-bottom: 0;
        border-radius: 8px 0 0 8px;
      }
      body.mobile-mode.pane-open .desktop-pane,
      body.pc-mode.pane-open .desktop-pane {
        display: block;
      }
      body.mobile-mode.pane-open .device-pane-toggle,
      body.pc-mode.pane-open .device-pane-toggle {
        display: none;
      }
    }
    @media (min-width: 1160px) {
      .app-layout.pc-mode {
        padding-right: 0;
      }
    }

    @media (prefers-color-scheme: dark) {
      :root { background: #11130f; color: #f4f4ef; }
      .tagline { color: #b9beb1; }
      .qr { background: #fff; border-color: #34372f; }
      .notice.success {
        border-color: #14532d;
        background: #052e16;
      }
      .notice.pending {
        border-color: #854d0e;
        background: #422006;
      }
      .notice.error {
        border-color: #881337;
        background: #4c0519;
      }
      .notice.success .notif-icon {
        background: #166534;
        color: #86efac;
      }
      .notice.pending .notif-icon {
        background: #713f12;
        color: #fde68a;
      }
      .notice.error .notif-icon {
        background: #881337;
        color: #fecdd3;
      }
      .notif-status { color: #f4f4ef; }
      .notif-data { color: #d7dccf; }
      button { background: #8ab4f8; color: #11130f; }
      .desktop-pane {
        background: #1b1d18;
        border-color: #34372f;
      }
      .device-pane-toggle {
        background: #1b1d18;
        border-color: #34372f;
        color: #8ab4f8;
      }
      .device-count,
      .device-meta,
      .empty-devices {
        color: #b9beb1;
      }
      .copy-link {
        background: #252820;
        border-color: #34372f;
        color: #f4f4ef;
      }
      .refresh-link {
        background: #252820;
        border-color: #34372f;
        color: #8ab4f8;
      }
      .device-list,
      .device-row {
        border-color: #34372f;
      }
      .device-name { color: #f4f4ef; }
      .edit-device-button:hover,
      .edit-device-button:focus-visible,
      .icon-button:hover,
      .icon-button:focus-visible {
        background: #252820;
        border-color: #34372f;
        color: #8ab4f8;
      }
      .modal {
        background: rgba(0, 0, 0, .58);
      }
      .modal-card {
        background: #1b1d18;
        border-color: #34372f;
      }
      .modal-head h2,
      .modal-field input {
        color: #f4f4ef;
      }
      .modal-field { color: #b9beb1; }
      .modal-field input {
        background: #11130f;
        border-color: #34372f;
      }
      .danger-button {
        background: #4c0519;
        border-color: #881337;
        color: #fecdd3;
      }
      footer { color: #b9beb1; }
      footer a { color: #b9beb1; }
      footer a:hover { color: #8ab4f8; }
    }
  </style>
</head>
<body>
  <div id="appLayout" class="app-layout">
    <main>
      <header class="app-header">
        <h1>ClipBridge</h1>
        <p class="tagline">Secure clipboard handoff</p>
      </header>

      <section id="pc" class="screen hidden" aria-label="Clipboard">
        <div id="qrWrap" class="qr"><img id="qr" alt="QR code for pairing"></div>
        <div id="pcStatus" class="sr-only" role="status" aria-live="polite">Creating session...</div>
        <div id="device" class="sr-only">No devices connected.</div>
        <div id="pcMessages" class="messages hidden" aria-label="Messages"></div>
      </section>

      <section id="mobile" class="screen hidden" aria-label="Clipboard">
        <div id="mobileQrWrap" class="qr"><img id="mobileQr" alt="QR code for pairing"></div>
        <div id="mobileStatus" class="sr-only" role="status" aria-live="polite">Connecting...</div>
        <div id="mobileMessages" class="messages hidden" aria-label="Messages"></div>
      </section>

      <div class="spacer" aria-hidden="true"></div>

      <div id="copyNotif" class="notice" role="status" aria-live="polite">
        <div id="notifIcon" class="notif-icon"></div>
        <div id="notifStatus" class="notif-status"></div>
        <div id="notifData" class="notif-data"></div>
      </div>

      <div class="spacer button-spacer" aria-hidden="true"></div>

      <div id="pcActions" class="actions hidden">
        <button id="sendPC" class="send-button" type="button">
          <span>Send clipboard</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
            <path d="M5 12h14"></path>
            <path d="m13 6 6 6-6 6"></path>
          </svg>
        </button>
      </div>

      <div id="mobileActions" class="actions">
        <button id="sendClipboard" class="send-button" type="button">
          <span>Send clipboard</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
            <path d="M5 12h14"></path>
            <path d="m13 6 6 6-6 6"></path>
          </svg>
        </button>
      </div>

      <footer>
        Blake Becker | <a href="https://github.com/Blake-goofy/clip-bridge" target="_blank" rel="noreferrer">Source code</a>
      </footer>
    </main>

    <button id="devicePaneToggle" class="device-pane-toggle hidden" type="button" aria-label="Open devices" aria-expanded="false">
      <svg id="devicePaneToggleIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
        <path d="m15 18-6-6 6-6"></path>
      </svg>
    </button>

    <aside id="devicePane" class="desktop-pane hidden" aria-label="Connected devices">
      <div class="join-link-row">
        <button id="refreshJoinLink" class="refresh-link" type="button" aria-label="New join link" title="New join link">
          <svg viewBox="0 0 487.23 487.23" fill="currentColor" aria-hidden="true">
            <path d="M55.323,203.641c15.664,0,29.813-9.405,35.872-23.854c25.017-59.604,83.842-101.61,152.42-101.61 c37.797,0,72.449,12.955,100.23,34.442l-21.775,3.371c-7.438,1.153-13.224,7.054-14.232,14.512 c-1.01,7.454,3.008,14.686,9.867,17.768l119.746,53.872c5.249,2.357,11.33,1.904,16.168-1.205 c4.83-3.114,7.764-8.458,7.796-14.208l0.621-131.943c0.042-7.506-4.851-14.144-12.024-16.332 c-7.185-2.188-14.947,0.589-19.104,6.837l-16.505,24.805C370.398,26.778,310.1,0,243.615,0C142.806,0,56.133,61.562,19.167,149.06 c-5.134,12.128-3.84,26.015,3.429,36.987C29.865,197.023,42.152,203.641,55.323,203.641z"></path>
            <path d="M464.635,301.184c-7.27-10.977-19.558-17.594-32.728-17.594c-15.664,0-29.813,9.405-35.872,23.854 c-25.018,59.604-83.843,101.61-152.42,101.61c-37.798,0-72.45-12.955-100.232-34.442l21.776-3.369 c7.437-1.153,13.223-7.055,14.233-14.514c1.009-7.453-3.008-14.686-9.867-17.768L49.779,285.089 c-5.25-2.356-11.33-1.905-16.169,1.205c-4.829,3.114-7.764,8.458-7.795,14.207l-0.622,131.943 c-0.042,7.506,4.85,14.144,12.024,16.332c7.185,2.188,14.948-0.59,19.104-6.839l16.505-24.805 c44.004,43.32,104.303,70.098,170.788,70.098c100.811,0,187.481-61.561,224.446-149.059 C473.197,326.043,471.903,312.157,464.635,301.184z"></path>
          </svg>
        </button>
        <button id="copyConnectURL" class="copy-link" type="button">
          <span id="connectURL"></span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
            <path d="M8 8h11v11H8z"></path>
            <path d="M5 16H4a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h11a1 1 0 0 1 1 1v1"></path>
          </svg>
        </button>
      </div>
      <div class="pane-head">
        <h2>Devices</h2>
        <span id="deviceCount" class="device-count">0 connected</span>
      </div>
      <div id="deviceList" class="device-list"></div>
      <p id="emptyDevices" class="empty-devices">No devices connected.</p>
    </aside>

    <div id="deviceModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="deviceModalTitle">
      <div class="modal-card">
        <div class="modal-head">
          <h2 id="deviceModalTitle">Edit device</h2>
          <button id="closeDeviceModal" class="icon-button" type="button" aria-label="Close">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
              <path d="M18 6 6 18"></path>
              <path d="m6 6 12 12"></path>
            </svg>
          </button>
        </div>
        <label class="modal-field">
          Name
          <input id="deviceNameInput" type="text" maxlength="40" autocomplete="off">
        </label>
        <div class="modal-actions">
          <button id="disconnectDevice" class="danger-button" type="button">Delete</button>
          <button id="saveDeviceName" type="button">Save</button>
        </div>
      </div>
    </div>
  </div>

  <script nonce="{{NONCE}}">
    const pc = document.querySelector("#pc");
    const mobile = document.querySelector("#mobile");
    const appLayout = document.querySelector("#appLayout");
    const devicePane = document.querySelector("#devicePane");
    const deviceCount = document.querySelector("#deviceCount");
    const deviceList = document.querySelector("#deviceList");
    const emptyDevices = document.querySelector("#emptyDevices");
    const connectURL = document.querySelector("#connectURL");
    const copyConnectURL = document.querySelector("#copyConnectURL");
    const refreshJoinLink = document.querySelector("#refreshJoinLink");
    const devicePaneToggle = document.querySelector("#devicePaneToggle");
    const deviceModal = document.querySelector("#deviceModal");
    const closeDeviceModal = document.querySelector("#closeDeviceModal");
    const deviceNameInput = document.querySelector("#deviceNameInput");
    const saveDeviceName = document.querySelector("#saveDeviceName");
    const disconnectDevice = document.querySelector("#disconnectDevice");
    const sessionMatch = location.pathname.match(/^\/s\/([^/]+)$/);
    const storageKey = "clipbridge.sid";
    let sid = sessionMatch ? sessionMatch[1] : "";
    let linkURL = "";
    let joined = false;
    let activeDevice = null;
    let pageRole = "";

    let pendingCopyText = "";
    let notifDismissTimer = null;

    function showToast(message) {
      showNotice(message, "success", "");
    }

    function plural(count, word) {
      return `${count} ${word}${count === 1 ? "" : "s"}`;
    }

    function formatConnectedAt(value) {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "Connected date unavailable";
      return `Connected ${new Intl.DateTimeFormat([], {
        dateStyle: "medium",
        timeStyle: "short"
      }).format(date)}`;
    }

    function renderDevices(devices) {
      const allDevices = Array.isArray(devices) ? devices : [];
      const connected = allDevices.filter((d) => d.connected).length;
      deviceCount.textContent = `${plural(connected, "device")} connected`;
      document.querySelector("#device").textContent = deviceCount.textContent;
      emptyDevices.classList.toggle("hidden", allDevices.length > 0);
      document.querySelector("#pcActions").classList.toggle("hidden", pageRole !== "pc" || connected < 2);
      deviceList.replaceChildren(...allDevices.map(deviceRow));
    }

    function deviceRow(device) {
      const row = document.createElement("div");
      row.className = "device-row";
      row.tabIndex = 0;
      row.setAttribute("role", "button");
      row.setAttribute("aria-label", `Edit ${device.name || "Device"}`);
      row.onclick = () => openDeviceModal(device);
      row.onkeydown = (event) => {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          openDeviceModal(device);
        }
      };

      const status = document.createElement("span");
      status.className = `device-status ${device.connected ? "online" : "offline"}`;
      status.setAttribute("aria-label", device.connected ? "Connected" : "Disconnected");

      const name = document.createElement("div");
      name.className = "device-name";
      name.textContent = device.name || "Device";

      const edit = document.createElement("button");
      edit.className = "edit-device-button";
      edit.type = "button";
      edit.setAttribute("aria-label", `Edit ${device.name || "Device"}`);
      edit.title = `Edit ${device.name || "Device"}`;
      edit.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true"><path d="m12 20 9-9-4-4-9 9-2 6 6-2z"></path><path d="m15 7 4 4"></path></svg>`;
      edit.onclick = (event) => {
        event.stopPropagation();
        openDeviceModal(device);
      };

      const meta = document.createElement("div");
      meta.className = "device-meta";
      meta.textContent = formatConnectedAt(device.connectedAt);

      row.append(status, name, edit, meta);
      return row;
    }

    function openDeviceModal(device) {
      activeDevice = device;
      deviceNameInput.value = device.name || "Device";
      deviceModal.classList.remove("hidden");
      requestAnimationFrame(() => {
        deviceNameInput.focus();
        deviceNameInput.select();
      });
    }

    function closeModal() {
      activeDevice = null;
      deviceModal.classList.add("hidden");
    }

    async function renameActiveDevice() {
      if (!activeDevice) return;
      try {
        await postJSON(`/api/session/${sid}/devices/${encodeURIComponent(activeDevice.id)}/name`, { name: deviceNameInput.value });
        showNotice("Device renamed", "success", "");
        closeModal();
      } catch (err) {
        showNotice(err.message, "error", "");
      }
    }

    async function disconnectActiveDevice() {
      if (!activeDevice) return;
      try {
        await postJSON(`/api/session/${sid}/devices/${encodeURIComponent(activeDevice.id)}/disconnect`);
        showNotice("Device disconnected", "success", "");
        closeModal();
      } catch (err) {
        showNotice(err.message, "error", "");
      }
    }

    closeDeviceModal.onclick = closeModal;
    saveDeviceName.onclick = renameActiveDevice;
    disconnectDevice.onclick = disconnectActiveDevice;
    deviceNameInput.onkeydown = (event) => {
      if (event.key === "Enter") renameActiveDevice();
    };
    deviceModal.onclick = (event) => {
      if (event.target === deviceModal) closeModal();
    };
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && !deviceModal.classList.contains("hidden")) closeModal();
    });

    function setPaneOpen(open) {
      document.body.classList.toggle("pane-open", open);
      devicePaneToggle.setAttribute("aria-expanded", open ? "true" : "false");
      devicePaneToggle.setAttribute("aria-label", open ? "Close devices" : "Open devices");
    }

    devicePaneToggle.onclick = () => setPaneOpen(!document.body.classList.contains("pane-open"));
    document.addEventListener("click", (event) => {
      if (
        (pageRole === "mobile" || pageRole === "pc") &&
        document.body.classList.contains("pane-open") &&
        !devicePane.contains(event.target) &&
        !devicePaneToggle.contains(event.target)
      ) {
        setPaneOpen(false);
      }
    });

    function syncPaneLayout() {
      if (pageRole !== "mobile" && pageRole !== "pc") return;
      const wide = window.matchMedia("(min-width: 900px)").matches;
      if (pageRole === "mobile") {
        document.body.classList.toggle("pc-mode", wide);
        appLayout.classList.toggle("pc-mode", wide);
      }
      devicePaneToggle.classList.toggle("hidden", wide);
      if (wide) setPaneOpen(false);
    }

    window.addEventListener("resize", syncPaneLayout);

    function setJoinLink(joinSID, qrURL, url) {
      if (!joinSID) return;
      linkURL = url || `${location.origin}/s/${joinSID}`;
      connectURL.textContent = linkURL;
      document.querySelector("#qr").src = qrURL || `/qr/${encodeURIComponent(joinSID)}.png`;
      document.querySelector("#mobileQr").src = qrURL || `/qr/${encodeURIComponent(joinSID)}.png`;
    }

    copyConnectURL.onclick = async () => {
      if (!linkURL) return;
      try {
        await navigator.clipboard.writeText(linkURL);
        showNotice("Link copied", "success", linkURL);
      } catch (_) {
        showNotice("Copy blocked", "error", linkURL);
      }
    };

    refreshJoinLink.onclick = async () => {
      try {
        const data = await postJSON(`/api/session/${sid}/link`);
        setJoinLink(data.sid, data.qrURL, data.linkURL);
        showNotice("New join link ready", "success", data.linkURL || linkURL);
      } catch (err) {
        showNotice(err.message, "error", "");
      }
    };

    function rememberedSID() {
      try {
        return localStorage.getItem(storageKey) || "";
      } catch (_) {
        return "";
      }
    }

    function rememberSID(value) {
      try {
        if (value) {
          localStorage.setItem(storageKey, value);
        } else {
          localStorage.removeItem(storageKey);
        }
      } catch (_) {}
    }

    async function pcSession() {
      const saved = rememberedSID();
      if (saved) {
        try {
          return await postJSON(`/api/session/${encodeURIComponent(saved)}/resume`);
        } catch (_) {
          rememberSID("");
        }
      }
      const data = await postJSON("/api/session");
      rememberSID(data.sid);
      return data;
    }

    function showNotice(message, state, text) {
      const notice = document.querySelector("#copyNotif");
      const icon = document.querySelector("#notifIcon");
      const statusText = document.querySelector("#notifStatus");
      const data = document.querySelector("#notifData");

      if (notifDismissTimer) {
        clearTimeout(notifDismissTimer);
        notifDismissTimer = null;
      }

      notice.classList.remove("success", "pending", "error");
      notice.classList.add(state, "show");
      icon.textContent = state === "pending" ? "!" : state === "error" ? "!" : "✓";
      statusText.textContent = message;
      data.textContent = text || "";

      if (state !== "pending") {
        notifDismissTimer = setTimeout(() => {
          notice.classList.remove("show");
        }, 2500);
      }
    }

    function showClipboardNotification(text, isPending) {
      if (isPending) {
        showNotice("Click or focus the page to copy", "pending", text);
      } else {
        showNotice("Copied to clipboard", "success", text);
      }
    }

    async function attemptPendingCopy() {
      if (pendingCopyText) {
        const textToCopy = pendingCopyText;
        try {
          await navigator.clipboard.writeText(textToCopy);
          pendingCopyText = "";
          showClipboardNotification(textToCopy, false);
        } catch (err) {
          console.error("Copy failed:", err);
        }
      }
    }

    window.addEventListener("focus", attemptPendingCopy);
    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible") {
        attemptPendingCopy();
      }
    });
    document.addEventListener("click", attemptPendingCopy);

    async function postJSON(url, body) {
      const res = await fetch(url, {
        method: "POST",
        credentials: "same-origin",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body || {})
      });
      if (!res.ok) {
        let message = "Request failed";
        try {
          const data = await res.json();
          message = data.error || message;
        } catch (_) {}
        throw new Error(message);
      }
      return res.json();
    }

    function addMessage(list, direction, text) {
      list.classList.remove("hidden");
      const bubble = document.createElement("button");
      bubble.type = "button";
      bubble.className = `bubble ${direction}`;
      bubble.title = "Copy";

      const body = document.createElement("span");
      body.textContent = text || "";

      bubble.append(body);
      bubble.onclick = async () => {
        try {
          await navigator.clipboard.writeText(text || "");
          showToast("Copied");
        } catch (_) {
          showNotice("Copy blocked", "error", "");
        }
      };
      list.append(bubble);
      list.scrollTop = list.scrollHeight;
    }

    function websocketURL(role) {
      const scheme = location.protocol === "https:" ? "wss:" : "ws:";
      return `${scheme}//${location.host}/ws/${sid}/${role}`;
    }

    async function receiveText(status, messages, text) {
      addMessage(messages, "received", text);
      try {
        if (!document.hasFocus()) throw new Error("tab is not active");
        await navigator.clipboard.writeText(text);
        status.textContent = "Received and copied.";
        pendingCopyText = "";
        showClipboardNotification(text, false);
      } catch (_) {
        status.textContent = "Received.";
        pendingCopyText = text;
        showClipboardNotification(text, true);
      }
    }

    async function sendClipboard(status, messages) {
      let text = "";
      try {
        text = await navigator.clipboard.readText();
      } catch (_) {
        status.textContent = "Clipboard access blocked.";
        showNotice("Clipboard access blocked", "error", "");
        return;
      }
      try {
        await postJSON(`/api/session/${sid}/clipboard`, { text });
        status.textContent = "Sent.";
        addMessage(messages, "sent", text);
        showNotice("Sent", "success", "");
      } catch (err) {
        status.textContent = err.message;
        showNotice(err.message, "error", "");
      }
    }

    async function startPC() {
      pageRole = "pc";
      pc.classList.remove("hidden");
      document.body.classList.add("pc-mode");
      document.body.classList.remove("mobile-mode", "pane-open");
      appLayout.classList.add("pc-mode");
      appLayout.classList.remove("mobile-mode");
      devicePane.classList.remove("hidden");
      document.querySelector("#mobileActions").classList.add("hidden");
      syncPaneLayout();
      const status = document.querySelector("#pcStatus");
      const messages = document.querySelector("#pcMessages");

      const data = await pcSession();
      sid = data.sid;
      rememberSID(sid);
      setJoinLink(data.sid, data.qrURL, data.linkURL);
      status.textContent = "Scan QR code to connect.";
      renderDevices([]);

      function connect() {
        const ws = new WebSocket(websocketURL("pc"));
        ws.onopen = () => status.textContent = "Scan QR code to connect.";
        ws.onclose = () => {
          status.textContent = "Reconnecting...";
          setTimeout(connect, 1000);
        };
        ws.onerror = () => status.textContent = "Connection failed.";
        ws.onmessage = async (message) => {
          const event = JSON.parse(message.data);
          if (event.type === "devices") {
            renderDevices(event.devices || []);
            status.textContent = (event.devices || []).some((device) => device.connected) ? "Ready." : "Scan QR code to connect.";
            return;
          }
          if (event.type === "link") {
            setJoinLink(event.sid);
            return;
          }
          if (event.type !== "clipboard.text") return;
          receiveText(status, messages, event.text || "");
        };
      }
      connect();

      document.querySelector("#sendPC").onclick = () => sendClipboard(status, messages);
    }

    function deviceLabel() {
      return "";
    }

    async function joinMobile() {
      if (joined) return;
      await postJSON(`/api/session/${sid}/join`, { device: deviceLabel() });
      joined = true;
      document.querySelector("#mobileStatus").textContent = "Connected.";
    }

    async function startMobile() {
      pageRole = "mobile";
      mobile.classList.remove("hidden");
      document.body.classList.remove("pc-mode");
      document.body.classList.add("mobile-mode");
      setPaneOpen(false);
      appLayout.classList.remove("pc-mode");
      appLayout.classList.add("mobile-mode");
      devicePane.classList.remove("hidden");
      devicePaneToggle.classList.remove("hidden");
      document.querySelector("#pcActions").classList.add("hidden");
      syncPaneLayout();
      const status = document.querySelector("#mobileStatus");
      const messages = document.querySelector("#mobileMessages");
      setJoinLink(sid);
      joinMobile()
        .then(() => {
          function connect() {
            const ws = new WebSocket(websocketURL("mobile"));
            ws.onopen = () => status.textContent = "Connected.";
            ws.onclose = () => {
              status.textContent = "Reconnecting...";
              setTimeout(connect, 1000);
            };
            ws.onerror = () => status.textContent = "Connection failed.";
            ws.onmessage = (message) => {
              const event = JSON.parse(message.data);
              if (event.type === "devices") {
                renderDevices(event.devices || []);
                return;
              }
              if (event.type === "link") {
                setJoinLink(event.sid);
                return;
              }
              if (event.type === "clipboard.text") receiveText(status, messages, event.text || "");
            };
          }
          connect();
        })
        .catch((err) => {
          status.textContent = err.message;
          showNotice(err.message, "error", "");
        });

      document.querySelector("#sendClipboard").onclick = () => sendClipboard(status, messages);
    }

    if (sid) {
      startMobile();
    } else {
      startPC().catch((err) => {
        pageRole = "pc";
        pc.classList.remove("hidden");
        document.body.classList.add("pc-mode");
        document.body.classList.remove("mobile-mode", "pane-open");
        appLayout.classList.add("pc-mode");
        appLayout.classList.remove("mobile-mode");
        devicePane.classList.remove("hidden");
        document.querySelector("#mobileActions").classList.add("hidden");
        syncPaneLayout();
        document.querySelector("#pcStatus").textContent = err.message;
        showNotice(err.message, "error", "");
      });
    }
  </script>
</body>
</html>
