<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ClipBridge</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <style nonce="{{NONCE}}">
    :root {
      color-scheme: light dark;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f8f8f3;
      color: #171717;
      overflow-x: hidden;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100svh;
      padding: 22px;
      position: relative;
      overflow-x: hidden;
    }
    .app-layout {
      width: min(100%, 980px);
      min-height: calc(100vh - 44px);
      min-height: calc(100svh - 44px);
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(0, 520px);
      justify-content: center;
      gap: 18px;
    }
    main {
      width: 100%;
      min-height: calc(100vh - 44px);
      min-height: calc(100svh - 44px);
      display: grid;
      grid-template-rows: auto auto minmax(12px, 1fr) auto auto auto auto;
      gap: 16px;
    }
    .app-header {
      display: grid;
      gap: 12px;
      text-align: center;
    }
    h1 {
      margin: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: .2em;
      font-size: clamp(28px, 8vw, 42px);
      line-height: 1;
      letter-spacing: 0;
    }
    .brand-icon {
      width: .95em;
      height: .95em;
      flex: 0 0 auto;
    }
    .tagline {
      min-height: 22px;
      margin: 0;
      color: #5c6257;
      font-size: 15px;
      font-weight: 650;
    }
    .screen {
      display: grid;
      gap: 14px;
      align-content: start;
    }
    .qr {
      width: min(100%, 288px);
      aspect-ratio: 1;
      justify-self: center;
      border: 1px solid #d9dbd2;
      border-radius: 8px;
      padding: 12px;
      background: #fff;
      cursor: pointer;
    }
    .qr canvas { display: block; width: 100%; height: 100%; }
    .qr.collapsed { display: none; }
    .qr-controls {
      display: flex;
      justify-content: center;
    }
    .qr-toggle {
      min-height: 38px;
      padding: 0 14px;
      border: 1px solid #d9dbd2;
      background: #f8f8f3;
      color: #174ea6;
      font-size: 13px;
    }
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
    .messages {
      display: none !important;
    }
    .bubble {
      display: none !important;
    }
    .spacer { min-height: 12px; }
    .button-spacer { min-height: 0; }
    .notice {
      width: min(100%, 340px);
      justify-self: center;
      min-height: 102px;
      border: 1px solid transparent;
      border-radius: 8px;
      padding: 14px;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 10px 12px;
      align-items: start;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity .16s ease, transform .16s ease;
    }
    .notice.show {
      opacity: 1;
      transform: translateY(0);
    }
    .notice.success {
      border-color: #bbf7d0;
      background: #f0fdf4;
    }
    .notice.pending {
      border-color: #fde68a;
      background: #fffbeb;
    }
    .notice.error {
      border-color: #fecaca;
      background: #fff1f2;
    }
    .notif-icon {
      width: 30px;
      height: 30px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      font-size: 18px;
      font-weight: 800;
    }
    .notice.success .notif-icon {
      background: #dcfce7;
      color: #22c55e;
    }
    .notice.pending .notif-icon {
      background: #fef3c7;
      color: #b45309;
    }
    .notice.error .notif-icon {
      background: #ffe4e6;
      color: #be123c;
    }
    .notif-status {
      align-self: center;
      font-size: 15px;
      font-weight: 750;
      color: #171717;
    }
    .notif-data {
      grid-column: 1 / -1;
      max-height: 110px;
      overflow-y: auto;
      color: #3f463b;
      font-size: 13px;
      line-height: 1.35;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .actions {
      display: flex;
      justify-content: center;
    }
    button {
      min-height: 50px;
      border: 0;
      border-radius: 8px;
      padding: 0 20px;
      background: #174ea6;
      color: #fff;
      font: inherit;
      font-weight: 750;
      cursor: pointer;
    }
    button:disabled {
      cursor: not-allowed;
      opacity: .55;
    }
    .send-button {
      width: min(100%, 340px);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .send-button svg {
      width: 20px;
      height: 20px;
      stroke-width: 2.5;
    }
    .desktop-pane {
      width: 100%;
      border: 1px solid #d9dbd2;
      border-radius: 8px;
      background: #fff;
      padding: 16px;
      align-self: start;
    }
    .pane-toggle {
      display: none;
    }
    .pane-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: baseline;
      margin-top: 14px;
      margin-bottom: 12px;
    }
    .pane-head h2 {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
      letter-spacing: 0;
    }
    .device-count {
      color: #5c6257;
      font-size: 13px;
      font-weight: 650;
      white-space: nowrap;
    }
    .session-list {
      display: grid;
      border-top: 1px solid #e3e5dd;
      margin-bottom: 14px;
    }
    .session-row {
      min-height: 46px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 34px;
      gap: 8px;
      align-items: center;
      border-bottom: 1px solid #e3e5dd;
      padding: 6px 0;
      overflow: hidden;
    }
    .session-select {
      min-width: 0;
      min-height: 34px;
      padding: 0 8px;
      border: 1px solid transparent;
      background: transparent;
      color: #171717;
      text-align: left;
      font-size: 13px;
      font-weight: 750;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .session-select.active {
      border-color: #a7c5fa;
      background: #eff6ff;
      color: #174ea6;
    }
    .add-session {
      min-height: 34px;
      padding: 0 12px;
      font-size: 13px;
    }
    .session-delete {
      width: 34px;
      min-height: 34px;
      padding: 0;
      display: grid;
      place-items: center;
      border: 1px solid transparent;
      background: transparent;
      color: #be123c;
      opacity: 0;
      pointer-events: none;
      transform: translateX(8px);
      transition: opacity .14s ease, transform .14s ease;
    }
    .session-row:focus-within .session-delete,
    .session-row.reveal-delete .session-delete {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(0);
    }
    @media (hover: hover) {
      .session-row:hover .session-delete {
        opacity: 1;
        pointer-events: auto;
        transform: translateX(0);
      }
    }
    .session-delete svg {
      width: 17px;
      height: 17px;
      stroke-width: 2.4;
    }
    .device-list {
      display: grid;
      margin-top: 14px;
      margin-inline: -8px;
      border-top: 1px solid #e3e5dd;
    }
    .device-row {
      display: grid;
      grid-template-columns: 10px minmax(0, 1fr) 34px;
      gap: 8px 10px;
      align-items: center;
      padding: 12px 8px;
      border-bottom: 1px solid #e3e5dd;
      cursor: pointer;
    }
    .device-row.active {
      background: #eff6ff;
    }
    .join-request-row {
      grid-template-columns: 10px minmax(0, 1fr) minmax(70px, auto);
      background: #fffbeb;
      border-radius: 8px;
    }
    .device-status {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #dc2626;
    }
    .device-status.online {
      background: #16a34a;
    }
    .join-request-row .device-status {
      background: #f59e0b;
    }
    .device-name {
      min-width: 0;
      color: #171717;
      font-weight: 650;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .device-meta {
      grid-column: 2 / -1;
      color: #5c6257;
      font-size: 12px;
      line-height: 1.35;
    }
    .edit-device-button {
      width: 34px;
      min-height: 34px;
      padding: 0;
      display: grid;
      place-items: center;
      border: 1px solid transparent;
      background: transparent;
      color: #5c6257;
      opacity: 0;
      transition: opacity .12s ease, background-color .12s ease, border-color .12s ease;
    }
    .device-row:hover .edit-device-button,
    .edit-device-button:focus-visible {
      opacity: 1;
    }
    .edit-device-button:hover,
    .edit-device-button:focus-visible {
      border-color: #d9dbd2;
      background: #f8f8f3;
      color: #174ea6;
    }
    .edit-device-button svg {
      width: 17px;
      height: 17px;
      stroke-width: 2.4;
    }
    .approve-join-button {
      min-width: 70px;
      min-height: 34px;
      padding: 0 12px;
      font-size: 12px;
      text-align: center;
      white-space: nowrap;
    }
    .empty-devices {
      margin: 12px 0 0;
      color: #5c6257;
      font-size: 13px;
    }
    .modal {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: grid;
      place-items: center;
      padding: 22px;
      min-height: 100vh;
      min-height: 100svh;
      background: rgba(23, 23, 23, .34);
    }
    .modal-card {
      width: min(100%, 360px);
      border: 1px solid #d9dbd2;
      border-radius: 8px;
      background: #fff;
      padding: 16px;
    }
    .modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }
    .modal-head h2 {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
    }
    .icon-button {
      width: 34px;
      min-height: 34px;
      padding: 0;
      display: grid;
      place-items: center;
      border: 1px solid transparent;
      background: transparent;
      color: #5c6257;
    }
    .icon-button:hover,
    .icon-button:focus-visible {
      border-color: #d9dbd2;
      background: #f8f8f3;
      color: #171717;
    }
    .icon-button svg {
      width: 18px;
      height: 18px;
      stroke-width: 2.4;
    }
    .modal-field {
      display: grid;
      gap: 6px;
      color: #5c6257;
      font-size: 13px;
      font-weight: 650;
    }
    .modal-field input {
      min-height: 42px;
      border: 1px solid #d9dbd2;
      border-radius: 6px;
      padding: 0 10px;
      background: #fff;
      color: #171717;
      font: inherit;
      font-weight: 650;
    }
    .modal-actions {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-top: 16px;
    }
    .danger-button {
      background: #fff1f2;
      color: #be123c;
      border: 1px solid #fecaca;
    }
    .hidden { display: none !important; }
    footer {
      padding-top: 2px;
      text-align: center;
      font-size: 13px;
      color: #5c6257;
    }
    footer a {
      color: #5c6257;
      text-decoration-thickness: 1px;
      text-underline-offset: 3px;
    }
    footer a:hover { color: #174ea6; }

    @media (min-width: 1180px) {
      body.pc-mode {
        padding-left: 0;
        padding-right: 0;
      }
      .app-layout.pc-mode {
        width: 100%;
        max-width: none;
        margin: 0;
        position: relative;
        grid-template-columns: minmax(0, 1fr) minmax(0, 520px) minmax(0, 1fr);
        justify-content: stretch;
      }
      .app-layout.pc-mode main {
        grid-column: 2;
      }
      .app-layout.pc-mode .desktop-pane {
        position: absolute;
        top: -22px;
        width: 320px;
        height: 100svh;
        overflow-y: auto;
        border-top: 0;
        border-bottom: 0;
      }
      .app-layout.pc-mode .session-pane {
        left: 0;
        border-left: 0;
        border-radius: 0 8px 8px 0;
      }
      .app-layout.pc-mode .device-pane {
        right: 0;
        border-right: 0;
        border-radius: 8px 0 0 8px;
      }
    }
    @media (max-width: 1179px) {
      body.mobile-mode,
      body.pc-mode {
        overflow-x: hidden;
      }
      body.mobile-mode main,
      body.pc-mode main {
        grid-template-rows: auto auto minmax(8px, 1fr) auto auto auto auto;
        gap: 12px;
      }
      body.mobile-mode .qr,
      body.pc-mode .qr {
        width: min(100%, 224px);
        padding: 10px;
      }
      body.mobile-mode .notice,
      body.pc-mode .notice {
        min-height: 86px;
      }
      .pane-toggle {
        position: fixed;
        top: 10px;
        z-index: 6;
        width: 34px;
        min-height: 40px;
        padding: 0;
        display: grid;
        place-items: center;
        border: 1px solid #d9dbd2;
        border-left: 0;
        border-radius: 0 8px 8px 0;
        background: #fff;
        color: #174ea6;
      }
      .session-pane-toggle {
        left: 0;
        border-left: 0;
        border-radius: 0 8px 8px 0;
      }
      .device-pane-toggle {
        right: 0;
        border-right: 0;
        border-left: 1px solid #d9dbd2;
        border-radius: 8px 0 0 8px;
      }
      .pane-toggle svg {
        width: 18px;
        height: 18px;
        stroke-width: 2.5;
      }
      body.mobile-mode .desktop-pane,
      body.pc-mode .desktop-pane {
        display: none;
        position: fixed;
        top: 0;
        z-index: 5;
        width: min(86vw, 320px);
        min-height: 100svh;
        overflow-y: auto;
        border-top: 0;
        border-bottom: 0;
      }
      body.mobile-mode .session-pane,
      body.pc-mode .session-pane {
        left: 0;
        width: min(86vw, 320px);
        border-left: 0;
        border-radius: 0 8px 8px 0;
      }
      body.mobile-mode .device-pane,
      body.pc-mode .device-pane {
        width: min(86vw, 320px);
        right: 0;
        border-right: 0;
        border-radius: 8px 0 0 8px;
      }
      body.mobile-mode.session-pane-open .session-pane,
      body.pc-mode.session-pane-open .session-pane,
      body.mobile-mode.device-pane-open .device-pane,
      body.pc-mode.device-pane-open .device-pane {
        display: block;
      }
      body.mobile-mode.session-pane-open .session-pane-toggle,
      body.pc-mode.session-pane-open .session-pane-toggle,
      body.mobile-mode.session-pane-open .device-pane-toggle,
      body.pc-mode.session-pane-open .device-pane-toggle,
      body.mobile-mode.device-pane-open .session-pane-toggle,
      body.pc-mode.device-pane-open .session-pane-toggle,
      body.mobile-mode.device-pane-open .device-pane-toggle,
      body.pc-mode.device-pane-open .device-pane-toggle {
        display: none;
      }
    }
    @media (prefers-color-scheme: dark) {
      :root { background: #11130f; color: #f4f4ef; }
      .tagline { color: #b9beb1; }
      .qr { background: #fff; border-color: #34372f; }
      .notice.success {
        border-color: #14532d;
        background: #052e16;
      }
      .notice.pending {
        border-color: #854d0e;
        background: #422006;
      }
      .notice.error {
        border-color: #881337;
        background: #4c0519;
      }
      .notice.success .notif-icon {
        background: #166534;
        color: #86efac;
      }
      .notice.pending .notif-icon {
        background: #713f12;
        color: #fde68a;
      }
      .notice.error .notif-icon {
        background: #881337;
        color: #fecdd3;
      }
      .notif-status { color: #f4f4ef; }
      .notif-data { color: #d7dccf; }
      button { background: #8ab4f8; color: #11130f; }
      .qr-toggle {
        background: #252820;
        border-color: #34372f;
        color: #8ab4f8;
      }
      .desktop-pane {
        background: #1b1d18;
        border-color: #34372f;
      }
      .pane-toggle {
        background: #1b1d18;
        border-color: #34372f;
        color: #8ab4f8;
      }
      .device-pane-toggle {
        border-left-color: #34372f;
      }
      .device-count,
      .device-meta,
      .empty-devices {
        color: #b9beb1;
      }
      .device-list,
      .device-row,
      .session-list,
      .session-row {
        border-color: #34372f;
      }
      .session-select { color: #f4f4ef; }
      .session-select.active {
        border-color: #31558f;
        background: #172033;
        color: #8ab4f8;
      }
      .device-name { color: #f4f4ef; }
      .device-row.active { background: #172033; }
      .join-request-row { background: #422006; }
      .edit-device-button:hover,
      .edit-device-button:focus-visible,
      .icon-button:hover,
      .icon-button:focus-visible {
        background: #252820;
        border-color: #34372f;
        color: #8ab4f8;
      }
      .modal {
        background: rgba(0, 0, 0, .58);
      }
      .modal-card {
        background: #1b1d18;
        border-color: #34372f;
      }
      .modal-head h2,
      .modal-field input {
        color: #f4f4ef;
      }
      .modal-field { color: #b9beb1; }
      .modal-field input {
        background: #11130f;
        border-color: #34372f;
      }
      .danger-button {
        background: #4c0519;
        border-color: #881337;
        color: #fecdd3;
      }
      footer { color: #b9beb1; }
      footer a { color: #b9beb1; }
      footer a:hover { color: #8ab4f8; }
    }
  </style>
</head>
<body>
  <div id="appLayout" class="app-layout">
    <main>
      <header class="app-header">
        <h1><img class="brand-icon" src="/favicon.svg" alt="">ClipBridge</h1>
        <p class="tagline">Secure clipboard handoff</p>
      </header>

      <section id="pc" class="screen hidden" aria-label="Clipboard">
        <div id="qrWrap" class="qr" role="button" tabindex="0" aria-label="Copy join link"><canvas id="qr" aria-label="QR code for pairing"></canvas></div>
        <div class="qr-controls">
          <button id="toggleQR" class="qr-toggle" type="button" aria-controls="qrWrap">Hide QR</button>
        </div>
        <div id="pcStatus" class="sr-only" role="status" aria-live="polite">Creating session...</div>
        <div id="device" class="sr-only">No devices connected.</div>
        <div id="pcMessages" class="messages hidden" aria-label="Messages"></div>
      </section>

      <section id="mobile" class="screen hidden" aria-label="Clipboard">
        <div id="mobileQrWrap" class="qr" role="button" tabindex="0" aria-label="Copy join link"><canvas id="mobileQr" aria-label="QR code for pairing"></canvas></div>
        <div class="qr-controls">
          <button id="toggleMobileQR" class="qr-toggle" type="button" aria-controls="mobileQrWrap">Hide QR</button>
        </div>
        <div id="mobileStatus" class="sr-only" role="status" aria-live="polite">Connecting...</div>
        <div id="mobileMessages" class="messages hidden" aria-label="Messages"></div>
      </section>

      <div class="spacer" aria-hidden="true"></div>

      <div id="copyNotif" class="notice" role="status" aria-live="polite">
        <div id="notifIcon" class="notif-icon"></div>
        <div id="notifStatus" class="notif-status"></div>
        <div id="notifData" class="notif-data"></div>
      </div>

      <div class="spacer button-spacer" aria-hidden="true"></div>

      <div id="pcActions" class="actions hidden">
        <button id="sendPC" class="send-button" type="button">
          <span>Send clipboard</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
            <path d="M5 12h14"></path>
            <path d="m13 6 6 6-6 6"></path>
          </svg>
        </button>
      </div>

      <div id="mobileActions" class="actions">
        <button id="sendClipboard" class="send-button" type="button">
          <span>Send clipboard</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
            <path d="M5 12h14"></path>
            <path d="m13 6 6 6-6 6"></path>
          </svg>
        </button>
      </div>

      <footer>
        Blake Becker | <a href="https://github.com/Blake-goofy/clip-bridge" target="_blank" rel="noreferrer">Source code</a>
      </footer>
    </main>

    <button id="sessionPaneToggle" class="pane-toggle session-pane-toggle hidden" type="button" aria-label="Open sessions" aria-expanded="false">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
        <path d="m9 18 6-6-6-6"></path>
      </svg>
    </button>

    <button id="devicePaneToggle" class="pane-toggle device-pane-toggle hidden" type="button" aria-label="Open devices" aria-expanded="false">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
        <path d="m15 18-6-6 6-6"></path>
      </svg>
    </button>

    <aside id="sessionPane" class="desktop-pane session-pane hidden" aria-label="Session manager">
      <div class="pane-head">
        <h2>Sessions</h2>
        <button id="addSession" class="add-session" type="button">Add link</button>
      </div>
      <div id="sessionList" class="session-list"></div>
    </aside>

    <aside id="devicePane" class="desktop-pane device-pane hidden" aria-label="Device manager">
      <div class="pane-head">
        <h2>Devices</h2>
        <span id="deviceCount" class="device-count">0 connected</span>
      </div>
      <div id="deviceList" class="device-list"></div>
      <p id="emptyDevices" class="empty-devices">No devices connected.</p>
    </aside>

    <div id="deviceModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="deviceModalTitle">
      <div class="modal-card">
        <div class="modal-head">
          <h2 id="deviceModalTitle">Edit device</h2>
          <button id="closeDeviceModal" class="icon-button" type="button" aria-label="Close">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
              <path d="M18 6 6 18"></path>
              <path d="m6 6 12 12"></path>
            </svg>
          </button>
        </div>
        <label class="modal-field">
          Name
          <input id="deviceNameInput" type="text" maxlength="40" autocomplete="off">
        </label>
        <div class="modal-actions">
          <button id="disconnectDevice" class="danger-button" type="button">Delete</button>
          <button id="saveDeviceName" type="button">Save</button>
        </div>
      </div>
    </div>
  </div>

  <script nonce="{{NONCE}}" src="/qrcode.js"></script>
  <script nonce="{{NONCE}}">
    const pc = document.querySelector("#pc");
    const mobile = document.querySelector("#mobile");
    const appLayout = document.querySelector("#appLayout");
    const sessionPane = document.querySelector("#sessionPane");
    const devicePane = document.querySelector("#devicePane");
    const deviceCount = document.querySelector("#deviceCount");
    const deviceList = document.querySelector("#deviceList");
    const emptyDevices = document.querySelector("#emptyDevices");
    const sessionPaneToggle = document.querySelector("#sessionPaneToggle");
    const devicePaneToggle = document.querySelector("#devicePaneToggle");
    const deviceModal = document.querySelector("#deviceModal");
    const closeDeviceModal = document.querySelector("#closeDeviceModal");
    const deviceNameInput = document.querySelector("#deviceNameInput");
    const saveDeviceName = document.querySelector("#saveDeviceName");
    const disconnectDevice = document.querySelector("#disconnectDevice");
    const sessionList = document.querySelector("#sessionList");
    const addSession = document.querySelector("#addSession");
    const encryptedClipboardMIME = "application/vnd.clipbridge.encrypted+json";
    const sessionMatch = location.pathname.match(/^\/s\/([^/]+)$/);
    const storageKey = "clipbridge.sid";
    const sessionsKey = "clipbridge.sessions.v1";
    let sid = sessionMatch ? sessionMatch[1] : "";
    let sessionKey = "";
    let linkURL = "";
    let joined = false;
    let activeDevice = null;
    let pageRole = "";
    let sessions = loadSessions();
    let pendingCopyText = "";
    let pendingCopyImage = null;
    let notifDismissTimer = null;
    const pcLinks = new Map();
    const deviceCache = new Map();
    const joinRequestCache = new Map();
    const activeDeviceIDs = new Map();

    setupQRButton(document.querySelector("#toggleQR"), document.querySelector("#qrWrap"));
    setupQRButton(document.querySelector("#toggleMobileQR"), document.querySelector("#mobileQrWrap"));
    for (const qr of [document.querySelector("#qrWrap"), document.querySelector("#mobileQrWrap")]) {
      qr.onclick = copySelectedLink;
      qr.onkeydown = (event) => {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          copySelectedLink();
        }
      };
    }

    function setupQRButton(button, wrap) {
      button.onclick = () => {
        const hidden = wrap.classList.toggle("collapsed");
        button.textContent = hidden ? "Show QR" : "Hide QR";
        button.setAttribute("aria-expanded", hidden ? "false" : "true");
      };
      button.setAttribute("aria-expanded", "true");
    }

    function plural(count, word) {
      return `${count} ${word}${count === 1 ? "" : "s"}`;
    }

    function formatConnectedAt(value) {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "Connected date unavailable";
      return `Connected ${new Intl.DateTimeFormat([], {
        dateStyle: "medium",
        timeStyle: "short"
      }).format(date)}`;
    }

    function renderSessions() {
      sessionList.replaceChildren(...sessions.map(sessionRow));
    }

    function sessionRow(session) {
      const row = document.createElement("div");
      row.className = "session-row";
      let swipeStartX = 0;
      let swipeStartY = 0;
      let ignoreNextClick = false;

      const select = document.createElement("button");
      select.type = "button";
      select.className = `session-select ${session.sid === sid ? "active" : ""}`;
      select.textContent = session.sid;
      select.title = session.sid;
      select.onclick = (event) => {
        if (ignoreNextClick) return;
        if (session.sid === sid) {
          copySelectedLink();
          clearRevealedSessionDeletes();
          if (event.detail > 0) select.blur();
          return;
        }
        selectSession(session, true);
        clearRevealedSessionDeletes();
        if (event.detail > 0) select.blur();
      };

      const del = document.createElement("button");
      del.type = "button";
      del.className = "session-delete";
      del.setAttribute("aria-label", `Delete ${session.sid}`);
      del.title = `Delete ${session.sid}`;
      del.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true"><path d="M3 6h18"></path><path d="M8 6V4h8v2"></path><path d="M6 6l1 15h10l1-15"></path></svg>`;
      del.onclick = (event) => {
        event.stopPropagation();
        deleteSession(session);
      };

      row.onpointerdown = (event) => {
        if (event.pointerType !== "touch") return;
        swipeStartX = event.clientX;
        swipeStartY = event.clientY;
        try { row.setPointerCapture(event.pointerId); } catch (_) {}
      };
      row.onpointermove = (event) => {
        if (event.pointerType !== "touch" || swipeStartX === 0) return;
        const dx = Math.abs(event.clientX - swipeStartX);
        const dy = Math.abs(event.clientY - swipeStartY);
        if (dy > 8 && dy > dx * 1.5) {
          try { row.releasePointerCapture(event.pointerId); } catch (_) {}
          swipeStartX = 0;
          swipeStartY = 0;
        }
      };
      row.onpointerup = (event) => {
        if (event.pointerType !== "touch" || swipeStartX === 0) return;
        const dx = event.clientX - swipeStartX;
        const dy = event.clientY - swipeStartY;
        swipeStartX = 0;
        swipeStartY = 0;
        if (Math.abs(dy) > 32 || Math.abs(dx) < 44) return;
        ignoreNextClick = true;
        setTimeout(() => { ignoreNextClick = false; }, 250);
        clearRevealedSessionDeletes(row);
        row.classList.toggle("reveal-delete", dx < 0);
      };
      row.onpointercancel = () => {
        swipeStartX = 0;
        swipeStartY = 0;
      };

      row.append(select, del);
      return row;
    }

    function renderDevices(devices, joinRequests) {
      const allDevices = Array.isArray(devices) ? devices : [];
      const pendingJoins = Array.isArray(joinRequests) ? joinRequests : [];
      const active = allDevices.find((device) => device.active);
      if (active) activeDeviceIDs.set(sid, active.id);
      const connected = allDevices.filter((d) => d.connected).length;
      deviceCount.textContent = `${plural(connected, "device")} connected`;
      document.querySelector("#device").textContent = deviceCount.textContent;
      emptyDevices.classList.toggle("hidden", allDevices.length > 0 || pendingJoins.length > 0);
      document.querySelector("#pcActions").classList.toggle("hidden", pageRole !== "pc" || connected < 2);
      deviceList.replaceChildren(...pendingJoins.map(joinRequestRow), ...allDevices.map(deviceRow));
    }

    function joinRequestRow(request) {
      const row = document.createElement("div");
      row.className = "device-row join-request-row";

      const status = document.createElement("span");
      status.className = "device-status";
      status.setAttribute("aria-label", "Waiting for approval");

      const name = document.createElement("div");
      name.className = "device-name";
      name.textContent = request.name || "New device";

      const approve = document.createElement("button");
      approve.className = "approve-join-button";
      approve.type = "button";
      approve.textContent = "Allow";
      approve.onclick = () => approveJoin(request.id);

      const meta = document.createElement("div");
      meta.className = "device-meta";
      meta.textContent = formatConnectedAt(request.requestedAt).replace("Connected", "Requested");

      row.append(status, name, approve, meta);
      return row;
    }

    async function approveJoin(requestID) {
      try {
        await postJSON(`/api/session/${encodeURIComponent(sid)}/joins/${encodeURIComponent(requestID)}/approve`);
        showNotice("Device allowed", "success", "");
      } catch (err) {
        showNotice(err.message, "error", "");
      }
    }

    function deviceRow(device) {
      const isActive = device.id === activeDeviceIDs.get(sid);
      const row = document.createElement("div");
      row.className = `device-row ${isActive ? "active" : ""}`;
      row.tabIndex = 0;
      row.setAttribute("role", "button");
      row.setAttribute("aria-label", `Edit ${device.name || "Device"}${isActive ? ", current device" : ""}`);
      row.onclick = () => openDeviceModal(device);
      row.onkeydown = (event) => {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          openDeviceModal(device);
        }
      };

      const status = document.createElement("span");
      status.className = `device-status ${device.connected ? "online" : "offline"}`;
      status.setAttribute("aria-label", device.connected ? "Connected" : "Disconnected");

      const name = document.createElement("div");
      name.className = "device-name";
      name.textContent = `${device.name || "Device"}${isActive ? " (this device)" : ""}`;

      const edit = document.createElement("button");
      edit.className = "edit-device-button";
      edit.type = "button";
      edit.setAttribute("aria-label", `Edit ${device.name || "Device"}`);
      edit.title = `Edit ${device.name || "Device"}`;
      edit.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true"><path d="m12 20 9-9-4-4-9 9-2 6 6-2z"></path><path d="m15 7 4 4"></path></svg>`;
      edit.onclick = (event) => {
        event.stopPropagation();
        openDeviceModal(device);
      };

      const meta = document.createElement("div");
      meta.className = "device-meta";
      meta.textContent = formatConnectedAt(device.connectedAt);

      row.append(status, name, edit, meta);
      return row;
    }

    function openDeviceModal(device) {
      activeDevice = device;
      const isActive = device.id === activeDeviceIDs.get(sid);
      deviceNameInput.value = device.name || "Device";
      disconnectDevice.disabled = isActive;
      disconnectDevice.title = isActive ? "Current device cannot be deleted" : "";
      deviceModal.classList.remove("hidden");
      requestAnimationFrame(() => {
        deviceNameInput.focus();
        deviceNameInput.select();
      });
    }

    function closeModal() {
      activeDevice = null;
      deviceModal.classList.add("hidden");
    }

    async function renameActiveDevice() {
      if (!activeDevice) return;
      const name = deviceNameInput.value;
      try {
        const isThisDevice = activeDevice.id === activeDeviceIDs.get(sid);
        let targets = isThisDevice
          ? sessions
              .map((session) => ({ sid: session.sid, deviceID: activeDeviceIDs.get(session.sid) }))
              .filter((target) => target.deviceID)
          : [{ sid, deviceID: activeDevice.id }];
        if (targets.length === 0) targets = [{ sid, deviceID: activeDevice.id }];
        const results = await Promise.allSettled(targets.map((target) =>
          postJSON(`/api/session/${encodeURIComponent(target.sid)}/devices/${encodeURIComponent(target.deviceID)}/name`, { name })
        ));
        if (!results.some((result) => result.status === "fulfilled")) {
          throw results.find((result) => result.status === "rejected").reason;
        }
        showNotice("Device renamed", "success", "");
        closeModal();
      } catch (err) {
        showNotice(err.message, "error", "");
      }
    }

    async function disconnectActiveDevice() {
      if (!activeDevice || activeDevice.id === activeDeviceIDs.get(sid)) return;
      try {
        await postJSON(`/api/session/${encodeURIComponent(sid)}/devices/${encodeURIComponent(activeDevice.id)}/disconnect`);
        showNotice("Device deleted", "success", "");
        closeModal();
      } catch (err) {
        showNotice(err.message, "error", "");
      }
    }

    closeDeviceModal.onclick = closeModal;
    saveDeviceName.onclick = renameActiveDevice;
    disconnectDevice.onclick = disconnectActiveDevice;
    deviceNameInput.onkeydown = (event) => {
      if (event.key === "Enter") renameActiveDevice();
    };
    deviceModal.onclick = (event) => {
      if (event.target === deviceModal) closeModal();
    };
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && !deviceModal.classList.contains("hidden")) closeModal();
    });

    function setPaneOpen(kind, open) {
      const isSession = kind === "session";
      const bodyClass = isSession ? "session-pane-open" : "device-pane-open";
      const otherClass = isSession ? "device-pane-open" : "session-pane-open";
      document.body.classList.toggle(bodyClass, open);
      if (open) document.body.classList.remove(otherClass);
      const sessionOpen = document.body.classList.contains("session-pane-open");
      const deviceOpen = document.body.classList.contains("device-pane-open");
      sessionPaneToggle.setAttribute("aria-expanded", sessionOpen ? "true" : "false");
      devicePaneToggle.setAttribute("aria-expanded", deviceOpen ? "true" : "false");
      sessionPaneToggle.setAttribute("aria-label", sessionOpen ? "Close sessions" : "Open sessions");
      devicePaneToggle.setAttribute("aria-label", deviceOpen ? "Close devices" : "Open devices");
    }

    sessionPaneToggle.onclick = () => setPaneOpen("session", !document.body.classList.contains("session-pane-open"));
    devicePaneToggle.onclick = () => setPaneOpen("device", !document.body.classList.contains("device-pane-open"));
    document.addEventListener("click", (event) => {
      if (!event.target.closest(".session-row")) {
        clearRevealedSessionDeletes();
      }
      const paneOpen = document.body.classList.contains("session-pane-open") || document.body.classList.contains("device-pane-open");
      if (
        (pageRole === "mobile" || pageRole === "pc") &&
        paneOpen &&
        !sessionPane.contains(event.target) &&
        !devicePane.contains(event.target) &&
        !sessionPaneToggle.contains(event.target) &&
        !devicePaneToggle.contains(event.target)
      ) {
        setPaneOpen("session", false);
        setPaneOpen("device", false);
      }
    });

    function syncPaneLayout() {
      if (pageRole !== "mobile" && pageRole !== "pc") return;
      const wide = window.matchMedia("(min-width: 1180px)").matches;
      if (pageRole === "mobile") {
        document.body.classList.toggle("pc-mode", wide);
        appLayout.classList.toggle("pc-mode", wide);
      }
      sessionPaneToggle.classList.toggle("hidden", wide);
      devicePaneToggle.classList.toggle("hidden", wide);
      if (wide) {
        setPaneOpen("session", false);
        setPaneOpen("device", false);
      }
    }

    window.addEventListener("resize", syncPaneLayout);

    function clearRevealedSessionDeletes(except) {
      document.querySelectorAll(".session-row.reveal-delete").forEach((row) => {
        if (row !== except) row.classList.remove("reveal-delete");
      });
    }

    function selectedSession() {
      return sessions.find((session) => session.sid === sid) || null;
    }

    function sessionLink(session) {
      const key = session && session.key ? session.key : sessionKey;
      const hash = key ? `#k=${encodeURIComponent(key)}` : "";
      return `${location.origin}/s/${session.sid}${hash}`;
    }

    async function copySelectedLink() {
      const session = selectedSession();
      const url = session ? sessionLink(session) : linkURL;
      if (!url) return;
      try {
        await navigator.clipboard.writeText(url);
        showNotice("Link copied", "success", url);
      } catch (_) {
        showNotice("Copy blocked", "error", url);
      }
    }

    function selectSession(session, updateURL) {
      sid = session.sid;
      sessionKey = session.key || sessionKeyFromHash() || randomSessionKey();
      session.key = sessionKey;
      upsertSession(session);
      rememberSID(sid);
      setJoinLink(sid);
      renderSessions();
      renderDevices(deviceCache.get(sid) || [], joinRequestCache.get(sid) || []);
      if (updateURL) {
        history.replaceState(null, "", `/s/${encodeURIComponent(sid)}#k=${encodeURIComponent(sessionKey)}`);
      }
    }

    function setJoinLink(joinSID) {
      if (!joinSID) return;
      const key = sessionKey || sessionKeyFromHash();
      const hash = key ? `#k=${encodeURIComponent(key)}` : "";
      linkURL = `${location.origin}/s/${joinSID}${hash}`;
      drawQRCode(document.querySelector("#qr"), linkURL);
      drawQRCode(document.querySelector("#mobileQr"), linkURL);
    }

    function drawQRCode(canvas, text) {
      if (!window.ClipBridgeQRCode) {
        showNotice("QR renderer unavailable", "error", "");
        return;
      }
      const modules = window.ClipBridgeQRCode.modules(text);
      const quiet = 4;
      const scale = Math.max(2, Math.floor(256 / (modules.length + quiet * 2)));
      const size = (modules.length + quiet * 2) * scale;
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = "#fff";
      ctx.fillRect(0, 0, size, size);
      ctx.fillStyle = "#000";
      for (let y = 0; y < modules.length; y++) {
        for (let x = 0; x < modules.length; x++) {
          if (modules[y][x]) {
            ctx.fillRect((x + quiet) * scale, (y + quiet) * scale, scale, scale);
          }
        }
      }
    }

    addSession.onclick = async () => {
      try {
        const data = await postJSON("/api/session");
        const session = { sid: data.sid, key: randomSessionKey() };
        upsertSession(session);
        selectSession(session, true);
        connectPCSession(session);
        showNotice("Link added", "success", linkURL);
      } catch (err) {
        showNotice(err.message, "error", "");
      }
    };

    async function deleteSession(session) {
      const old = pcLinks.get(session.sid);
      if (old) old.closed = true;
      if (old && old.ws) old.ws.close();
      pcLinks.delete(session.sid);
      try {
        await postJSON(`/api/session/${encodeURIComponent(session.sid)}/close`);
      } catch (_) {}
      sessions = sessions.filter((candidate) => candidate.sid !== session.sid);
      saveSessions();
      if (sid === session.sid) {
        if (sessions.length > 0) {
          selectSession(sessions[0], true);
        } else {
          addSession.click();
        }
      } else {
        renderSessions();
      }
      showNotice("Link closed", "success", "");
    }

    function loadSessions() {
      try {
        const parsed = JSON.parse(localStorage.getItem(sessionsKey) || "[]");
        if (Array.isArray(parsed)) {
          return parsed.filter((session) => session && session.sid).map((session) => ({
            sid: String(session.sid),
            key: String(session.key || "")
          }));
        }
      } catch (_) {}
      return [];
    }

    function saveSessions() {
      try {
        localStorage.setItem(sessionsKey, JSON.stringify(sessions));
      } catch (_) {}
    }

    function upsertSession(session) {
      const existing = sessions.find((candidate) => candidate.sid === session.sid);
      if (existing) {
        existing.key = session.key || existing.key;
      } else {
        sessions.push({ sid: session.sid, key: session.key || "" });
      }
      saveSessions();
      renderSessions();
    }

    function rememberedSID() {
      try {
        return localStorage.getItem(storageKey) || "";
      } catch (_) {
        return "";
      }
    }

    function rememberSID(value) {
      try {
        if (value) {
          localStorage.setItem(storageKey, value);
        } else {
          localStorage.removeItem(storageKey);
        }
      } catch (_) {}
    }

    async function pcSession() {
      const pathSID = sessionMatch ? sessionMatch[1] : "";
      if (pathSID) {
        const data = await postJSON(`/api/session/${encodeURIComponent(pathSID)}/resume`);
        const session = { sid: data.sid, key: sessionKeyFromHash() || (sessions.find((item) => item.sid === data.sid) || {}).key || randomSessionKey() };
        upsertSession(session);
        return session;
      }
      const saved = rememberedSID();
      const savedSession = sessions.find((session) => session.sid === saved) || sessions[0];
      if (savedSession) {
        try {
          const data = await postJSON(`/api/session/${encodeURIComponent(savedSession.sid)}/resume`);
          savedSession.sid = data.sid;
          savedSession.key = savedSession.key || randomSessionKey();
          upsertSession(savedSession);
          return savedSession;
        } catch (_) {
          sessions = sessions.filter((session) => session.sid !== savedSession.sid);
          saveSessions();
          rememberSID("");
        }
      }
      const data = await postJSON("/api/session");
      const session = { sid: data.sid, key: randomSessionKey() };
      upsertSession(session);
      return session;
    }

    function showNotice(message, state, text) {
      const notice = document.querySelector("#copyNotif");
      const icon = document.querySelector("#notifIcon");
      const statusText = document.querySelector("#notifStatus");
      const data = document.querySelector("#notifData");

      if (notifDismissTimer) {
        clearTimeout(notifDismissTimer);
        notifDismissTimer = null;
      }

      notice.classList.remove("success", "pending", "error");
      notice.classList.add(state, "show");
      icon.textContent = state === "pending" ? "!" : state === "error" ? "!" : "✓";
      statusText.textContent = message;
      data.textContent = text || "";

      if (state !== "pending") {
        notifDismissTimer = setTimeout(() => {
          notice.classList.remove("show");
        }, 2500);
      }
    }

    function imageSummary(image) {
      const data = image && image.data ? image.data : "";
      const padding = data.endsWith("==") ? 2 : data.endsWith("=") ? 1 : 0;
      const bytes = Math.max(0, Math.floor(data.length * 3 / 4) - padding);
      const size = bytes >= 1024 * 1024 ? `${(bytes / 1024 / 1024).toFixed(1)} MB` : `${Math.max(1, Math.ceil(bytes / 1024))} KB`;
      return `PNG image, ${size}`;
    }

    function showClipboardNotification(text, isPending) {
      showNotice(isPending ? "Click or focus the page to copy" : "Copied to clipboard", isPending ? "pending" : "success", text);
    }

    function showImageClipboardNotification(image, isPending) {
      showNotice(isPending ? "Click or focus the page to copy image" : "Image copied to clipboard", isPending ? "pending" : "success", imageSummary(image));
    }

    function clearPendingCopy() {
      pendingCopyText = "";
      pendingCopyImage = null;
    }

    async function attemptPendingCopy() {
      if (pendingCopyImage) {
        const imageToCopy = pendingCopyImage;
        try {
          await writeImageClipboard(imageToCopy);
          clearPendingCopy();
          showImageClipboardNotification(imageToCopy, false);
        } catch (err) {
          console.error("Image copy failed:", err);
        }
        return;
      }
      if (pendingCopyText) {
        const textToCopy = pendingCopyText;
        try {
          await navigator.clipboard.writeText(textToCopy);
          clearPendingCopy();
          showClipboardNotification(textToCopy, false);
        } catch (err) {
          console.error("Copy failed:", err);
        }
      }
    }

    window.addEventListener("focus", attemptPendingCopy);
    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible") attemptPendingCopy();
    });
    document.addEventListener("click", attemptPendingCopy);

    async function postJSON(url, body) {
      const res = await fetch(url, {
        method: "POST",
        credentials: "same-origin",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body || {})
      });
      if (!res.ok) {
        let message = "Request failed";
        try {
          const data = await res.json();
          message = data.error || message;
        } catch (_) {}
        throw new Error(message);
      }
      return res.json();
    }

    function addMessage(list, direction, text) {
      list.classList.remove("hidden");
      const bubble = document.createElement("button");
      bubble.type = "button";
      bubble.className = `bubble ${direction}`;
      bubble.title = "Copy";
      const body = document.createElement("span");
      body.textContent = text || "";
      bubble.append(body);
      bubble.onclick = async () => {
        try {
          await navigator.clipboard.writeText(text || "");
          showNotice("Copied", "success", "");
        } catch (_) {
          showNotice("Copy blocked", "error", "");
        }
      };
      list.append(bubble);
      list.scrollTop = list.scrollHeight;
    }

    function websocketURLFor(sessionSID, role) {
      const scheme = location.protocol === "https:" ? "wss:" : "ws:";
      return `${scheme}//${location.host}/ws/${encodeURIComponent(sessionSID)}/${role}`;
    }

    async function blobToBase64(blob) {
      const bytes = new Uint8Array(await blob.arrayBuffer());
      const chunkSize = 0x8000;
      let binary = "";
      for (let i = 0; i < bytes.length; i += chunkSize) {
        binary += String.fromCharCode(...bytes.subarray(i, i + chunkSize));
      }
      return btoa(binary);
    }

    function base64ToBlob(data, mime) {
      const binary = atob(data || "");
      const chunkSize = 0x8000;
      const chunks = [];
      for (let i = 0; i < binary.length; i += chunkSize) {
        const slice = binary.slice(i, i + chunkSize);
        const bytes = new Uint8Array(slice.length);
        for (let j = 0; j < slice.length; j++) bytes[j] = slice.charCodeAt(j);
        chunks.push(bytes);
      }
      return new Blob(chunks, { type: mime });
    }

    async function readClipboardImage() {
      if (!navigator.clipboard.read) return null;
      const items = await navigator.clipboard.read();
      for (const item of items) {
        const type = item.types.find((candidate) => candidate === "image/png");
        if (!type) continue;
        const blob = await item.getType(type);
        return { mime: type, data: await blobToBase64(blob) };
      }
      return null;
    }

    async function writeImageClipboard(image) {
      if (!window.ClipboardItem || !navigator.clipboard.write) throw new Error("image clipboard is not supported");
      const blob = base64ToBlob(image.data, image.mime);
      await navigator.clipboard.write([new ClipboardItem({ [image.mime]: blob })]);
    }

    function sessionKeyFromHash() {
      try {
        return new URLSearchParams(location.hash.slice(1)).get("k") || "";
      } catch (_) {
        return "";
      }
    }

    function randomSessionKey() {
      const bytes = new Uint8Array(32);
      crypto.getRandomValues(bytes);
      return bytesToBase64URL(bytes);
    }

    function bytesToBase64URL(bytes) {
      let binary = "";
      for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
      return btoa(binary).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/g, "");
    }

    function base64URLToBytes(value) {
      const padded = value.replace(/-/g, "+").replace(/_/g, "/") + "=".repeat((4 - value.length % 4) % 4);
      const binary = atob(padded);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      return bytes;
    }

    async function cryptoKey(rawKey) {
      if (!crypto.subtle || !rawKey) throw new Error("secure link key unavailable");
      return crypto.subtle.importKey("raw", base64URLToBytes(rawKey), "AES-GCM", false, ["encrypt", "decrypt"]);
    }

    async function encryptPayload(payload) {
      const iv = new Uint8Array(12);
      crypto.getRandomValues(iv);
      const key = await cryptoKey(sessionKey);
      const data = new TextEncoder().encode(JSON.stringify(payload));
      const ct = new Uint8Array(await crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, data));
      return { mime: encryptedClipboardMIME, data: JSON.stringify({ v: 1, iv: bytesToBase64URL(iv), ct: bytesToBase64URL(ct) }) };
    }

    async function decryptPayload(data, rawKey) {
      const box = JSON.parse(data || "{}");
      const key = await cryptoKey(rawKey);
      const plain = await crypto.subtle.decrypt({ name: "AES-GCM", iv: base64URLToBytes(box.iv || "") }, key, base64URLToBytes(box.ct || ""));
      return JSON.parse(new TextDecoder().decode(plain));
    }

    async function receiveText(status, messages, text) {
      addMessage(messages, "received", text);
      try {
        if (!document.hasFocus()) throw new Error("tab is not active");
        await navigator.clipboard.writeText(text);
        status.textContent = "Received and copied.";
        clearPendingCopy();
        showClipboardNotification(text, false);
      } catch (_) {
        status.textContent = "Received.";
        pendingCopyImage = null;
        pendingCopyText = text;
        showClipboardNotification(text, true);
      }
    }

    async function receiveImage(status, messages, image) {
      addMessage(messages, "received", imageSummary(image));
      try {
        if (!document.hasFocus()) throw new Error("tab is not active");
        await writeImageClipboard(image);
        status.textContent = "Received and copied.";
        clearPendingCopy();
        showImageClipboardNotification(image, false);
      } catch (_) {
        status.textContent = "Received.";
        pendingCopyText = "";
        pendingCopyImage = image;
        showImageClipboardNotification(image, true);
      }
    }

    async function receiveEvent(status, messages, session, event) {
      if (event.type === "me") {
        activeDeviceIDs.set(session.sid, event.deviceId || "");
        if (session.sid === sid) renderDevices(deviceCache.get(sid) || []);
        return;
      }
      if (event.type === "devices") {
        deviceCache.set(session.sid, event.devices || []);
        joinRequestCache.set(session.sid, event.joinRequests || []);
        const active = (event.devices || []).find((device) => device.active);
        if (active) activeDeviceIDs.set(session.sid, active.id);
        if (session.sid === sid) {
          renderDevices(event.devices || [], event.joinRequests || []);
          status.textContent = (event.devices || []).some((device) => device.connected) ? "Ready." : "Scan QR code to connect.";
        }
        return;
      }
      if (event.type === "clipboard.encrypted") {
        try {
          const payload = await decryptPayload(event.data, session.key);
          if (payload.type === "image") {
            await receiveImage(status, messages, { mime: payload.mime || "image/png", data: payload.data || "" });
          } else {
            await receiveText(status, messages, payload.text || "");
          }
        } catch (_) {
          showNotice("Could not decrypt clipboard", "error", session.sid);
        }
        return;
      }
      if (event.type === "clipboard.image") {
        await receiveImage(status, messages, { mime: event.mime || "image/png", data: event.data || "" });
        return;
      }
      if (event.type === "clipboard.text") await receiveText(status, messages, event.text || "");
    }

    async function sendClipboard(status, messages) {
      try {
        const image = await readClipboardImage();
        if (image) {
          await postJSON(`/api/session/${encodeURIComponent(sid)}/clipboard`, await encryptPayload({ type: "image", mime: image.mime, data: image.data }));
          status.textContent = "Sent.";
          addMessage(messages, "sent", imageSummary(image));
          showNotice("Image sent", "success", imageSummary(image));
          return;
        }
      } catch (err) {
        if (err.message === "secure link key unavailable") {
          showNotice(err.message, "error", "");
          return;
        }
      }

      let text = "";
      try {
        text = await navigator.clipboard.readText();
      } catch (_) {
        status.textContent = "Clipboard access blocked.";
        showNotice("Clipboard access blocked", "error", "");
        return;
      }
      try {
        await postJSON(`/api/session/${encodeURIComponent(sid)}/clipboard`, await encryptPayload({ type: "text", text }));
        status.textContent = "Sent.";
        addMessage(messages, "sent", text);
        showNotice("Sent", "success", "");
      } catch (err) {
        status.textContent = err.message;
        showNotice(err.message, "error", "");
      }
    }

    function connectPCSession(session) {
      if (pcLinks.has(session.sid)) return;
      const state = { ws: null, closed: false };
      pcLinks.set(session.sid, state);
      const status = document.querySelector("#pcStatus");
      const messages = document.querySelector("#pcMessages");
      const connect = () => {
        if (state.closed) return;
        const ws = new WebSocket(websocketURLFor(session.sid, "pc"));
        state.ws = ws;
        ws.onopen = () => {
          if (session.sid === sid) status.textContent = "Scan QR code to connect.";
        };
        ws.onclose = () => {
          if (!state.closed) setTimeout(connect, 1000);
        };
        ws.onerror = () => {
          if (session.sid === sid) status.textContent = "Connection failed.";
        };
        ws.onmessage = (message) => receiveEvent(status, messages, session, JSON.parse(message.data));
      };
      connect();
    }

    async function startPC() {
      pageRole = "pc";
      pc.classList.remove("hidden");
      mobile.classList.add("hidden");
      document.body.classList.add("pc-mode");
      document.body.classList.remove("mobile-mode", "session-pane-open", "device-pane-open");
      appLayout.classList.add("pc-mode");
      appLayout.classList.remove("mobile-mode");
      sessionPane.classList.remove("hidden");
      devicePane.classList.remove("hidden");
      document.querySelector("#mobileActions").classList.add("hidden");
      syncPaneLayout();

      const session = await pcSession();
      selectSession(session, true);
      for (const item of sessions) connectPCSession(item);
      document.querySelector("#pcStatus").textContent = "Scan QR code to connect.";
      document.querySelector("#sendPC").onclick = () => sendClipboard(document.querySelector("#pcStatus"), document.querySelector("#pcMessages"));
    }

    function deviceLabel() {
      return "";
    }

    function wait(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    async function joinMobile() {
      if (joined) return;
      const status = document.querySelector("#mobileStatus");
      let noticeShown = false;
      while (!joined) {
        const result = await postJSON(`/api/session/${encodeURIComponent(sid)}/join`, { device: deviceLabel() });
        if (result.status === "pending") {
          status.textContent = "Waiting for approval.";
          if (!noticeShown) {
            showNotice("Waiting for approval", "pending", "Keep this page open");
            noticeShown = true;
          }
          await wait(1500);
          continue;
        }
        joined = true;
      }
      status.textContent = "Connected.";
      if (noticeShown) showNotice("Connected", "success", "");
    }

    async function startMobile() {
      pageRole = "mobile";
      sessionKey = sessionKeyFromHash();
      pc.classList.add("hidden");
      mobile.classList.remove("hidden");
      document.body.classList.remove("pc-mode");
      document.body.classList.add("mobile-mode");
      setPaneOpen("session", false);
      setPaneOpen("device", false);
      appLayout.classList.remove("pc-mode");
      appLayout.classList.add("mobile-mode");
      sessionPane.classList.remove("hidden");
      devicePane.classList.remove("hidden");
      sessionPaneToggle.classList.remove("hidden");
      devicePaneToggle.classList.remove("hidden");
      document.querySelector("#pcActions").classList.add("hidden");
      document.querySelector("#mobileActions").classList.remove("hidden");
      syncPaneLayout();
      const status = document.querySelector("#mobileStatus");
      const messages = document.querySelector("#mobileMessages");
      if (!sessionKey) {
        status.textContent = "Secure link key missing.";
        showNotice("Secure link key missing", "error", "");
        return;
      }
      const session = { sid, key: sessionKey };
      selectSession(session, true);
      setJoinLink(sid);
      joinMobile()
        .then(() => {
          function connect() {
            const ws = new WebSocket(websocketURLFor(sid, "mobile"));
            ws.onopen = () => status.textContent = "Connected.";
            ws.onclose = () => {
              status.textContent = "Reconnecting...";
              setTimeout(connect, 1000);
            };
            ws.onerror = () => status.textContent = "Connection failed.";
            ws.onmessage = (message) => receiveEvent(status, messages, session, JSON.parse(message.data));
          }
          connect();
        })
        .catch((err) => {
          status.textContent = err.message;
          showNotice(err.message, "error", "");
        });

      document.querySelector("#sendClipboard").onclick = () => sendClipboard(status, messages);
    }

    if (sid) {
      startPC().catch(() => startMobile());
    } else {
      startPC().catch((err) => {
        pageRole = "pc";
        pc.classList.remove("hidden");
        document.body.classList.add("pc-mode");
        document.body.classList.remove("mobile-mode", "session-pane-open", "device-pane-open");
        appLayout.classList.add("pc-mode");
        appLayout.classList.remove("mobile-mode");
        sessionPane.classList.remove("hidden");
        devicePane.classList.remove("hidden");
        document.querySelector("#mobileActions").classList.add("hidden");
        syncPaneLayout();
        document.querySelector("#pcStatus").textContent = err.message;
        showNotice(err.message, "error", "");
      });
    }
  </script>
</body>
</html>
