<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ClipBridge</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/app.css">
</head>
<body>
  <div id="appLayout" class="app-layout">
    <main>
      <div class="pane-controls" aria-label="Panels">
        <button id="sessionPaneToggle" class="pane-toggle session-pane-toggle hidden" type="button" aria-label="Open sessions" aria-expanded="false">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
            <path d="M8 6h13"></path>
            <path d="M8 12h13"></path>
            <path d="M8 18h13"></path>
            <path d="M3 6h.01"></path>
            <path d="M3 12h.01"></path>
            <path d="M3 18h.01"></path>
          </svg>
          <span>Sessions</span>
        </button>

        <button id="devicePaneToggle" class="pane-toggle device-pane-toggle hidden" type="button" aria-label="Open devices" aria-expanded="false">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
            <rect x="7" y="2" width="10" height="20" rx="2"></rect>
            <path d="M11 18h2"></path>
          </svg>
          <span>Devices</span>
        </button>
      </div>

      <header class="app-header">
        <h1><img class="brand-icon" src="/favicon.svg" alt="">ClipBridge</h1>
        <p class="tagline">Secure clipboard handoff</p>
      </header>

      <section id="pc" class="screen hidden" aria-label="Clipboard">
        <div id="qrWrap" class="qr" role="button" tabindex="0" aria-label="Copy join link"><canvas id="qr" aria-label="QR code for pairing"></canvas></div>
        <div class="qr-controls">
          <button id="toggleQR" class="qr-toggle" type="button" aria-controls="qrWrap">Hide QR</button>
        </div>
        <div id="pcStatus" class="sr-only" role="status" aria-live="polite">Creating session...</div>
        <div id="device" class="sr-only">No devices connected.</div>
        <div id="pcMessages" class="messages hidden" aria-label="Messages"></div>
      </section>

      <section id="mobile" class="screen hidden" aria-label="Clipboard">
        <div id="mobileQrWrap" class="qr" role="button" tabindex="0" aria-label="Copy join link"><canvas id="mobileQr" aria-label="QR code for pairing"></canvas></div>
        <div class="qr-controls">
          <button id="toggleMobileQR" class="qr-toggle" type="button" aria-controls="mobileQrWrap">Hide QR</button>
        </div>
        <div id="mobileStatus" class="sr-only" role="status" aria-live="polite">Connecting...</div>
        <div id="mobileMessages" class="messages hidden" aria-label="Messages"></div>
      </section>

      <div class="spacer" aria-hidden="true"></div>

      <div id="copyNotif" class="notice" role="status" aria-live="polite">
        <div id="notifIcon" class="notif-icon"></div>
        <div id="notifStatus" class="notif-status"></div>
        <div id="notifData" class="notif-data"></div>
      </div>

      <div class="spacer button-spacer" aria-hidden="true"></div>

      <div id="pcActions" class="actions hidden">
        <button id="peekPC" class="peek-button" type="button" aria-label="Peek clipboard" title="Peek clipboard">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
            <path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7S2 12 2 12z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
        </button>
        <button id="sendPC" class="send-button" type="button">
          <span>Send clipboard</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
            <path d="M5 12h14"></path>
            <path d="m13 6 6 6-6 6"></path>
          </svg>
        </button>
      </div>

      <div id="mobileActions" class="actions">
        <button id="peekClipboard" class="peek-button" type="button" aria-label="Peek clipboard" title="Peek clipboard">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
            <path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7S2 12 2 12z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
        </button>
        <button id="sendClipboard" class="send-button" type="button">
          <span>Send clipboard</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
            <path d="M5 12h14"></path>
            <path d="m13 6 6 6-6 6"></path>
          </svg>
        </button>
      </div>

    </main>

    <footer class="site-footer">
      <a href="/analytics">Analytics</a> | <a href="/privacy">Privacy</a> | <a href="/terms">Terms</a> | <a href="https://github.com/Blake-goofy/clip-bridge" target="_blank" rel="noreferrer">Source code</a>
    </footer>

    <aside id="sessionPane" class="desktop-pane session-pane hidden" aria-label="Session manager">
      <div class="pane-head">
        <h2 class="pane-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
            <path d="M8 6h13"></path>
            <path d="M8 12h13"></path>
            <path d="M8 18h13"></path>
            <path d="M3 6h.01"></path>
            <path d="M3 12h.01"></path>
            <path d="M3 18h.01"></path>
          </svg>
          <span>Sessions</span>
        </h2>
        <button id="addSession" class="add-session" type="button">Add session</button>
      </div>
      <div id="sessionList" class="session-list"></div>
    </aside>

    <aside id="devicePane" class="desktop-pane device-pane hidden" aria-label="Device manager">
      <div class="pane-head">
        <h2 class="pane-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
            <rect x="7" y="2" width="10" height="20" rx="2"></rect>
            <path d="M11 18h2"></path>
          </svg>
          <span>Devices</span>
        </h2>
        <span id="deviceCount" class="device-count">0 connected</span>
      </div>
      <div id="deviceList" class="device-list"></div>
      <p id="emptyDevices" class="empty-devices">No devices connected.</p>
    </aside>

    <div id="sessionModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="sessionModalTitle">
      <div class="modal-card">
        <div class="modal-head">
          <h2 id="sessionModalTitle">Edit session</h2>
          <button id="closeSessionModal" class="icon-button" type="button" aria-label="Close">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
              <path d="M18 6 6 18"></path>
              <path d="m6 6 12 12"></path>
            </svg>
          </button>
        </div>
        <label class="modal-field">
          Name
          <input id="sessionNameInput" type="text" maxlength="40" autocomplete="off">
        </label>
        <div class="modal-actions">
          <button id="deleteSessionButton" class="danger-button" type="button">Delete</button>
          <button id="saveSessionName" type="button">Save</button>
        </div>
      </div>
    </div>

    <div id="deviceModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="deviceModalTitle">
      <div class="modal-card">
        <div class="modal-head">
          <h2 id="deviceModalTitle">Edit device</h2>
          <button id="closeDeviceModal" class="icon-button" type="button" aria-label="Close">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
              <path d="M18 6 6 18"></path>
              <path d="m6 6 12 12"></path>
            </svg>
          </button>
        </div>
        <label class="modal-field">
          Name
          <input id="deviceNameInput" type="text" maxlength="40" autocomplete="off">
        </label>
        <div class="modal-actions">
          <button id="disconnectDevice" class="danger-button" type="button">Delete</button>
          <button id="saveDeviceName" type="button">Save</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/qrcode.js"></script>
  <script src="/app.js"></script>
</body>
</html>
